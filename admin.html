<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة إدارة Abo al abd | ELITE PC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; padding: 20px; direction: rtl; display: none; }
        .admin-box { max-width: 1000px; margin: 0 auto; }
        .card { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 25px; }
        h3 { color: var(--main-red); border-bottom: 1px solid #222; padding-bottom: 10px; margin-top: 0; }
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; font-family: 'Cairo'; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .btn-save { background: var(--main-red); color: white; }
        .btn-edit { background: #ffbb33; color: black; padding: 5px 10px; font-size: 13px; margin-left: 5px; border-radius: 5px; cursor: pointer; border: none; }
        .btn-delete { background: #ff4444; color: white; padding: 5px 10px; font-size: 13px; border-radius: 5px; cursor: pointer; border: none; }
        .order-img { width: 50px; height: 50px; object-fit: contain; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="admin-box">
    <h1 style="text-align:center; color:var(--main-red);">لوحة التحكم الملكية ♔</h1>

    <div class="card">
        <h3 id="form-title"><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h3>
        <input type="hidden" id="edit-index" value="-1">
        <input type="text" id="pn" placeholder="اسم المنتج">
        <input type="number" id="pp" placeholder="السعر">
        <input type="text" id="pi" placeholder="رابط صورة المنتج">
        
        <label>الفئة:</label>
        <select id="pc">
            <option value="KEYBOARDS">كيبوردات</option>
            <option value="MICE">ماوسات</option>
            <option value="MOUSEPADS">ماوس باد</option>
            <option value="RGB">أضوية RGB</option>
            <option value="MIC">مايك</option>
        </select>

        <label>ملصق الحالة:</label>
        <select id="ps">
            <option value="none">بدون ملصق</option>
            <option value="new">جديد ✨</option>
            <option value="low">متبقي قليل ⚠️</option>
            <option value="out">نفدت الكمية ❌</option>
            <option value="soon">قريباً 🔜</option>
        </select>

        <button onclick="saveProduct()" id="main-btn" class="btn btn-save">نشر المنتج</button>
        <button onclick="resetForm()" id="cancel-btn" style="display:none; background:grey; margin-top:10px;" class="btn">إلغاء التعديل</button>
    </div>

    <div class="card">
        <h3><i class="fas fa-edit"></i> المنتجات الحالية</h3>
        <div id="current-products-list"></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-shopping-basket"></i> سجل الطلبات</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>التاريخ</th><th>الصور</th><th>الزبون</th><th>المنتجات</th><th>المجموع</th><th>حذف</th></tr>
                </thead>
                <tbody id="orders-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    if(prompt("كلمة السر:") === "جود") document.body.style.display = "block";
    else window.location.href = "index.html";

    let products = JSON.parse(localStorage.getItem('elite_v15')) || [];
    let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];

    // وظيفة الحفظ (إضافة أو تعديل)
    function saveProduct() {
        const n = document.getElementById('pn').value, p = document.getElementById('pp').value, 
              i = document.getElementById('pi').value, c = document.getElementById('pc').value, 
              s = document.getElementById('ps').value, editIdx = document.getElementById('edit-index').value;

        if(!n || !p) return alert("عبّي البيانات!");

        const productData = {name: n, price: parseInt(p), img: i, cat: c, status: s};

        if(editIdx === "-1") {
            products.push(productData);
            alert("تم النشر بنجاح!");
        } else {
            products[editIdx] = productData;
            alert("تم التعديل بنجاح!");
        }

        localStorage.setItem('elite_v15', JSON.stringify(products));
        resetForm();
        renderCurrentProducts();
    }

    // تجهيز الفورم للتعديل
    function prepareEdit(idx) {
        const p = products[idx];
        document.getElementById('pn').value = p.name;
        document.getElementById('pp').value = p.price;
        document.getElementById('pi').value = p.img;
        document.getElementById('pc').value = p.cat;
        document.getElementById('ps').value = p.status || 'none';
        document.getElementById('edit-index').value = idx;
        
        document.getElementById('form-title').innerHTML = '<i class="fas fa-edit"></i> تعديل المنتج: ' + p.name;
        document.getElementById('main-btn').innerText = "حفظ التعديلات";
        document.getElementById('cancel-btn').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetForm() {
        document.getElementById('edit-index').value = "-1";
        document.getElementById('pn').value = '';
        document.getElementById('pp').value = '';
        document.getElementById('pi').value = '';
        document.getElementById('form-title').innerHTML = '<i class="fas fa-plus-circle"></i> إضافة منتج جديد';
        document.getElementById('main-btn').innerText = "نشر المنتج";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function deleteProduct(idx) {
        if(confirm("حذف المنتج نهائياً؟")) {
            products.splice(idx, 1);
            localStorage.setItem('elite_v15', JSON.stringify(products));
            renderCurrentProducts();
        }
    }

    function renderCurrentProducts() {
        document.getElementById('current-products-list').innerHTML = products.map((p, idx) => `
            <div class="product-item">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${p.img}" style="width:40px; height:40px; object-fit:contain; background:#000;">
                    <span>${p.name} (${p.price} ₪) - <small>${p.status}</small></span>
                </div>
                <div>
                    <button class="btn-edit" onclick="prepareEdit(${idx})">تعديل</button>
                    <button class="btn-delete" onclick="deleteProduct(${idx})">حذف</button>
                </div>
            </div>
        `).reverse().join('');
    }

    function renderOrders() {
        document.getElementById('orders-list').innerHTML = orders.map((o, idx) => `
            <tr>
                <td><small>${o.date}</small></td>
                <td>${o.images ? o.images.map(img => `<img src="${img}" class="order-img">`).join('') : ''}</td>
                <td>${o.name}<br><small>${o.phone}</small></td>
                <td><small>${o.items}</small></td>
                <td style="color:var(--main-red)">${o.total} ₪</td>
                <td><i class="fas fa-trash" onclick="deleteOrder(${idx})" style="color:red; cursor:pointer;"></i></td>
            </tr>
        `).reverse().join('');
    }

    function deleteOrder(idx) {
        if(confirm("مسح الطلبية؟")) {
            orders.splice(idx, 1);
            localStorage.setItem('elite_orders', JSON.stringify(orders));
            renderOrders();
        }
    }

    renderCurrentProducts();
    renderOrders();
</script>
</body>
</html>
