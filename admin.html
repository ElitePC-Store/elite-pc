<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE PC - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --main-green: #2ecc71; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: var(--main-red); border-right: 4px solid var(--main-red); padding-right: 10px; margin-top: 0; font-size: 20px; }
        .form-control { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 12px; font-family: 'Cairo', sans-serif; }
        .btn { background: var(--main-red); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-family: 'Cairo', sans-serif; transition: 0.2s; font-size: 16px; }
        .btn:hover { opacity: 0.9; }
        .btn-green { background: var(--main-green); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: center; }
        th, td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }
        th { color: var(--main-red); }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card">
        <h2><i class="fas fa-palette"></i> تغيير هوية المتجر (اللوجو والخلفية)</h2>
        <input type="text" id="logo-url" class="form-control" placeholder="رابط اللوجو الجديد (صورة مربعة)">
        <input type="text" id="bg-url" class="form-control" placeholder="رابط خلفية الهيرو (Hero Background)">
        <button onclick="updateIdentity()" class="btn btn-green">تحديث الهوية الآن ✓</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-box-open"></i> إضافة منتج جديد</h2>
        <input type="text" id="p-name" class="form-control" placeholder="اسم المنتج">
        <input type="number" id="p-price" class="form-control" placeholder="السعر (بالشيكل)">
        <input type="text" id="p-img" class="form-control" placeholder="رابط الصورة">
        
        <select id="p-cat" class="form-control">
            <option value="KEYBOARDS">كيبوردات</option>
            <option value="MICE">ماوسات</option>
            <option value="MOUSEPADS">ماوس باد</option>
        </select>

        <select id="p-badge" class="form-control">
            <option value="">بدون ملصق</option>
            <option value="جديد ✨">جديد ✨</option>
            <option value="خصم 🔥">خصم 🔥</option>
            <option value="تخفيض ⚡">تخفيض ⚡</option>
        </select>

        <button onclick="addProduct()" class="btn">نشر في المتجر</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-shopping-cart"></i> سجل الطلبات (الفواتير والمناطق)</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>الرقم</th>
                        <th>الزجون</th>
                        <th>الهاتف</th>
                        <th>المنطقة والمدينة</th>
                        <th>المنتجات</th>
                        <th>المجموع</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="orders-table">
                    </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v8')) || [];
    let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
    let identity = JSON.parse(localStorage.getItem('elite_identity')) || {logo: '', bg: ''};

    // تعبئة حقول الهوية الحالية إن وجدت
    if(identity.logo) document.getElementById('logo-url').value = identity.logo;
    if(identity.bg) document.getElementById('bg-url').value = identity.bg;

    function updateIdentity() {
        identity.logo = document.getElementById('logo-url').value;
        identity.bg = document.getElementById('bg-url').value;
        localStorage.setItem('elite_identity', JSON.stringify(identity));
        alert("تم تحديث هوية المتجر بنجاح!");
    }

    function addProduct() {
        let name = document.getElementById('p-name').value;
        let price = parseFloat(document.getElementById('p-price').value);
        let img = document.getElementById('p-img').value;
        let cat = document.getElementById('p-cat').value;
        let badge = document.getElementById('p-badge').value;

        if(!name || isNaN(price) || !img) {
            alert("الرجاء تعبئة اسم المنتج والسعر ورابط الصورة بشكل صحيح!");
            return;
        }

        products.push({name, price, img, cat, badge});
        localStorage.setItem('elite_v8', JSON.stringify(products));
        alert("تم نشر المنتج بنجاح في المتجر!");
        
        document.getElementById('p-name').value = '';
        document.getElementById('p-price').value = '';
        document.getElementById('p-img').value = '';
    }

    function renderOrders() {
        let tbody = document.getElementById('orders-table');
        if(orders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="color:grey;">لا توجد طلبات جديدة حالياً.</td></tr>`;
            return;
        }

        tbody.innerHTML = orders.map((o, index) => `
            <tr>
                <td>#${index + 1}</td>
                <td>${o.name}</td>
                <td>${o.phone}</td>
                <td style="color:#00f2ff; font-weight:bold;">${o.region || 'غير محدد'} - ${o.city || ''}</td>
                <td>${o.items}</td>
                <td style="color:var(--main-green); font-weight:bold;">₪${o.total}</td>
                <td><button class="del-btn" onclick="deleteOrder(${index})">مسح</button></td>
            </tr>
        `).join('');
    }

    function deleteOrder(index) {
        if(confirm("هل أنت متأكد من مسح هذا الطلب؟")) {
            orders.splice(index, 1);
            localStorage.setItem('elite_orders', JSON.stringify(orders));
            renderOrders();
        }
    }

    renderOrders();
</script>
</body>
</html>
