<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة | ELITE PC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; }
        body { font-family: 'Cairo'; background: #0a0a0a; color: white; padding: 20px; direction: rtl; display: none; }
        .admin-box { max-width: 900px; margin: 0 auto; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; }
        th { background: #1a1a1a; color: var(--main-red); }
        .order-img { width: 35px; height: 35px; border-radius: 5px; margin: 2px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 style="text-align:center;">لوحة تحكم Abo al abd ♔</h2>

    <div class="card">
        <h3><i class="fas fa-shopping-cart"></i> الطلبات الجديدة</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>الزبون</th>
                        <th>المنتجات</th>
                        <th>المجموع</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="orders-list"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-image"></i> إعدادات الواجهة</h3>
        <input type="text" id="site-logo" placeholder="رابط اللوجو الجديد">
        <input type="text" id="site-bg" placeholder="رابط خلفية المتجر">
        <button class="btn" style="background:#25d366;" onclick="saveSettings()">حفظ التعديلات</button>
    </div>

    <div class="card">
        <h3><i class="fas fa-plus"></i> إضافة منتج</h3>
        <input type="text" id="pn" placeholder="اسم المنتج">
        <input type="number" id="pp" placeholder="السعر">
        <input type="text" id="pi" placeholder="رابط الصورة">
        <select id="pc">
            <option value="KEYBOARDS">كيبوردات</option>
            <option value="MICE">ماوسات</option>
            <option value="MIC">مايك</option>
        </select>
        <button class="btn" style="background:var(--main-red);" onclick="saveProduct()">نشر المنتج</button>
    </div>
</div>

<script>
    if(prompt("كلمة السر:") === "جود") document.body.style.display="block";
    else window.location.href="index.html";

    let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
    let products = JSON.parse(localStorage.getItem('elite_v15')) || [];

    function renderOrders() {
        document.getElementById('orders-list').innerHTML = orders.map((o, idx) => `
            <tr>
                <td><small>${o.date}</small></td>
                <td><b>${o.name}</b><br><small>${o.phone} (${o.area})</small></td>
                <td>${o.items}</td>
                <td style="color:var(--main-red)">${o.total} ₪</td>
                <td><i class="fas fa-trash" onclick="deleteOrder(${idx})" style="color:red; cursor:pointer;"></i></td>
            </tr>
        `).reverse().join('');
    }

    function deleteOrder(idx) {
        if(confirm("تم التوصيل وبدك تمسح الطلب؟")) {
            orders.splice(idx, 1);
            localStorage.setItem('elite_orders', JSON.stringify(orders));
            renderOrders();
        }
    }

    function saveSettings() {
        localStorage.setItem('elite_logo', document.getElementById('site-logo').value);
        localStorage.setItem('elite_bg', document.getElementById('site-bg').value);
        alert("تم الحفظ!");
    }

    function saveProduct() {
        const n = document.getElementById('pn').value, p = document.getElementById('pp').value, i = document.getElementById('pi').value, c = document.getElementById('pc').value;
        products.push({name:n, price:parseInt(p), img:i, cat:c});
        localStorage.setItem('elite_v15', JSON.stringify(products));
        alert("تم النشر!");
    }

    renderOrders();
</script>
</body>
</html>
