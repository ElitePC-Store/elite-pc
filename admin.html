<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة ELITE PC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo'; background: #000; color: white; padding: 20px; direction: rtl; }
        .box { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: #050505; }
        th, td { border: 1px solid #222; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="box">
        <h3>🎨 تغيير هوية المتجر (اللوجو والخلفية)</h3>
        <input type="text" id="l-url" placeholder="رابط اللوجو الدائري الجديد">
        <input type="text" id="b-url" placeholder="رابط خلفية البيسي">
        <button onclick="updateIdentity()" class="btn" style="background:#25d366;">تحديث الهوية الآن ✅</button>
    </div>

    <div class="box">
        <h3>📦 إضافة منتج جديد</h3>
        <input type="text" id="pn" placeholder="اسم المنتج">
        <input type="number" id="pp" placeholder="السعر">
        <input type="text" id="pi" placeholder="رابط الصورة">
        <select id="pc">
            <option value="KEYBOARDS">كيبوردات</option>
            <option value="MICE">ماوسات</option>
            <option value="MOUSEPADS">ماوس باد</option>
            <option value="RGB">أضوية RGB</option>
            <option value="MIC">مايك</option>
        </select>
        <select id="ps">
            <option value="none">بدون ملصق</option>
            <option value="new">جديد ✨</option>
            <option value="out">نفدت الكمية ❌</option>
        </select>
        <button onclick="addProduct()" class="btn" style="background:#ff4d4d;">نشر في المتجر</button>
    </div>

    <div class="box">
        <h3>🛒 سجل الطلبات (الفواتير)</h3>
        <table id="order-table">
            <thead>
                <tr><th>الرقم</th><th>الزبون</th><th>الإيميل</th><th>المنتجات</th><th>المجموع</th><th>حذف</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

<script>
    if(prompt("باسورد الإدارة:") !== "جود") window.location.href="index.html";

    function updateIdentity() {
        localStorage.setItem('elite_logo', document.getElementById('l-url').value);
        localStorage.setItem('elite_bg', document.getElementById('b-url').value);
        alert("المتجر صار بستايلك الجديد!");
    }

    function addProduct() {
        let p = JSON.parse(localStorage.getItem('elite_v15')) || [];
        p.push({
            name: document.getElementById('pn').value,
            price: parseInt(document.getElementById('pp').value),
            img: document.getElementById('pi').value,
            cat: document.getElementById('pc').value,
            status: document.getElementById('ps').value
        });
        localStorage.setItem('elite_v15', JSON.stringify(p));
        alert("تمت الإضافة!"); location.reload();
    }

    function renderOrders() {
        let os = JSON.parse(localStorage.getItem('elite_orders')) || [];
        document.querySelector('tbody').innerHTML = os.map((o, idx) => `
            <tr>
                <td>#${o.id}</td>
                <td>${o.name}<br>${o.phone}</td>
                <td>${o.email || '---'}</td>
                <td>${o.items}</td>
                <td>${o.total} ₪</td>
                <td><button onclick="deleteOrder(${idx})" style="color:red; background:none; border:none;">حذف</button></td>
            </tr>
        `).reverse().join('');
    }

    function deleteOrder(i) { if(confirm("حذف الطلب؟")) { let os = JSON.parse(localStorage.getItem('elite_orders')); os.splice(i,1); localStorage.setItem('elite_orders', JSON.stringify(os)); renderOrders(); } }
    
    document.getElementById('l-url').value = localStorage.getItem('elite_logo') || '';
    document.getElementById('b-url').value = localStorage.getItem('elite_bg') || '';
    renderOrders();
</script>
</body>
</html>
