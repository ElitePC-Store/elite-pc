<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | ELITE PC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #ff4d4d; }
        body { font-family: 'Cairo'; background: #0a0a0a; color: white; padding: 15px; direction: rtl; }
        .card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-edit { background: #ffbb33; width: auto; padding: 5px 10px; margin-left: 5px; }
        .btn-delete { background: #ff4444; width: auto; padding: 5px 10px; }
        .product-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>إعدادات الواجهة</h3>
        <input type="text" id="logo-url" placeholder="رابط اللوجو">
        <input type="text" id="bg-url" placeholder="رابط خلفية المتجر">
        <button onclick="saveBranding()" class="btn" style="background:#25d366; color:white;">حفظ الهوية</button>
    </div>

    <div class="card">
        <h3 id="form-title">إضافة/تعديل منتج</h3>
        <input type="hidden" id="edit-id" value="-1">
        <input type="text" id="p-name" placeholder="اسم المنتج">
        <input type="number" id="p-price" placeholder="السعر">
        <input type="text" id="p-img" placeholder="رابط الصورة">
        <select id="p-cat">
            <option value="KEYBOARDS">كيبوردات</option>
            <option value="MICE">ماوسات</option>
            <option value="MOUSEPADS">ماوس باد</option>
            <option value="RGB">أضوية RGB</option>
            <option value="MIC">مايك</option>
        </select>
        <select id="p-status">
            <option value="none">بدون ملصق</option>
            <option value="new">جديد ✨</option>
            <option value="low">متبقي قليل ⚠️</option>
            <option value="out">نفدت الكمية ❌</option>
        </select>
        <button onclick="saveProduct()" id="save-btn" class="btn" style="background:var(--main-red); color:white;">حفظ المنتج</button>
    </div>

    <div class="card">
        <h3>المنتجات الحالية</h3>
        <div id="p-list"></div>
    </div>

<script>
    if(prompt("كلمة السر:") !== "جود") window.location.href="index.html";

    let products = JSON.parse(localStorage.getItem('elite_v15')) || [];

    function saveBranding() {
        localStorage.setItem('elite_logo', document.getElementById('logo-url').value);
        localStorage.setItem('elite_bg', document.getElementById('bg-url').value);
        alert("تم التحديث");
    }

    function saveProduct() {
        const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, 
              i = document.getElementById('p-img').value, c = document.getElementById('p-cat').value,
              s = document.getElementById('p-status').value, id = document.getElementById('edit-id').value;
        const data = {name:n, price:parseInt(p), img:i, cat:c, status:s};
        if(id === "-1") products.push(data); else products[id] = data;
        localStorage.setItem('elite_v15', JSON.stringify(products));
        location.reload();
    }

    function editP(idx) {
        const p = products[idx];
        document.getElementById('p-name').value = p.name;
        document.getElementById('p-price').value = p.price;
        document.getElementById('p-img').value = p.img;
        document.getElementById('p-cat').value = p.cat;
        document.getElementById('p-status').value = p.status || 'none';
        document.getElementById('edit-id').value = idx;
        document.getElementById('save-btn').innerText = "تحديث المنتج";
    }

    function deleteP(idx) { if(confirm("حذف؟")) { products.splice(idx,1); localStorage.setItem('elite_v15', JSON.stringify(products)); render(); } }

    function render() {
        document.getElementById('p-list').innerHTML = products.map((p, idx) => `
            <div class="product-row">
                <span>${p.name} (${p.price}₪)</span>
                <div>
                    <button class="btn btn-edit" onclick="editP(${idx})">تعديل</button>
                    <button class="btn btn-delete" onclick="deleteP(${idx})">حذف</button>
                </div>
            </div>
        `).reverse().join('');
    }

    document.getElementById('logo-url').value = localStorage.getItem('elite_logo') || '';
    document.getElementById('bg-url').value = localStorage.getItem('elite_bg') || '';
    render();
</script>
</body>
</html>
