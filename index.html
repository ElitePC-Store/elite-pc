<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | أداء بلا حدود</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #111; --wa-green: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; }
        
        header { background: rgba(10,10,10,0.95); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--main-red); }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--main-red); object-fit: cover; }
        
        .hero { height: 40vh; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070'); background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero-logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--main-red); margin-bottom: 10px; }

        .remove-x { color: var(--main-red); cursor: pointer; font-weight: bold; font-size: 20px; margin-left: 10px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #1a1a1a; margin-bottom: 8px; border-radius: 8px; }

        .category-section { padding: 30px 5%; }
        .category-title { border-right: 5px solid var(--main-red); padding-right: 15px; margin-bottom: 25px; font-size: 24px; color: var(--main-red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: center; }
        .product-card img { width: 100%; height: 160px; object-fit: contain; }

        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* أزرار التواصل العائمة */
        .social-float { position: fixed; left: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
        .float-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: white; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 600px; margin: 30px auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid var(--main-red); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }

        /* صفحة الشكر */
        #success-screen { display: none; text-align: center; padding: 50px 20px; }
        .success-icon { font-size: 80px; color: #25d366; margin-bottom: 20px; }

        .orders-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; color: white; }
        .orders-table th, .orders-table td { border: 1px solid #333; padding: 8px; text-align: right; }
        .orders-table th { background: #222; color: var(--main-red); }
    </style>
</head>
<body>

<div id="main-site">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="site-logo-img" src="" class="logo-img">
            <b>ELITE PC</b>
        </div>
        <nav>
            <button onclick="openAdmin()" style="background:none; color:grey; border:none; cursor:pointer;">[ لوحة التحكم ]</button>
            <button onclick="showCart()" style="background:var(--main-red); padding:8px 15px; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer;">السلة (<span id="count">0</span>)</button>
        </nav>
    </header>

    <div class="hero">
        <img id="hero-logo-img" src="" class="hero-logo">
        <h1 style="margin:0;">ELITE PC STORE</h1>
        <p style="color: var(--main-red); font-weight: bold;">أداء بلا حدود</p>
    </div>

    <div id="shop-data" class="category-section"></div>
</div>

<div id="success-screen">
    <div class="success-icon"><i class="fas fa-check-circle"></i></div>
    <h1 style="color: var(--main-red);">شكراً لك!</h1>
    <h2>تم استلام منتجك من ELITE PC</h2>
    <p>سنتواصل معك قريباً لتأكيد التوصيل.</p>
    <button onclick="location.reload()" class="buy-btn" style="width: 200px; margin-top: 20px;">العودة للمتجر</button>
</div>

<div class="social-float">
    <a href="https://wa.me/972525995654" class="float-btn" style="background: #25d366;"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.tiktok.com/@elite_pc_store" class="float-btn" style="background: #000; border: 1px solid #fff;"><i class="fab fa-tiktok"></i></a>
</div>

<div id="cart-modal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center;">إتمام الطلب 🛒</h3>
        <div id="cart-summary"></div>
        <select id="area" onchange="updateTotal()">
            <option value="0">اختر منطقة التوصيل...</option>
            <option value="70">الداخل (+70 ₪)</option>
            <option value="50">القدس (+50 ₪)</option>
            <option value="20">الضفة (+20 ₪)</option>
        </select>
        <input type="text" id="cn" placeholder="اسمك الكامل">
        <input type="text" id="ct" placeholder="رقم الهاتف">
        <h2 style="text-align:center;">المجموع: <span id="total-val">0</span> ₪</h2>
        <button onclick="submitOrder()" class="buy-btn" style="background:#25d366;">تأكيد الطلب نهائياً</button>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; color:grey; margin-top:10px;">رجوع</button>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-content" style="max-width: 900px;">
        <h3>إدارة متجر ELITE PC ⚙️</h3>
        
        <div style="background:#1a1a1a; padding:15px; border-radius:10px; margin-bottom:20px;">
            <h4>تحديث اللوجو</h4>
            <input type="text" id="new-logo-url" placeholder="ضع رابط اللوجو الجديد هنا">
            <button onclick="updateLogo()" class="buy-btn" style="background:blue;">تحديث اللوجو</button>
        </div>

        <div style="display:flex; gap:10px;">
            <button onclick="handleEdit()" style="flex:1; background:orange; border:none; padding:10px; border-radius:5px; font-weight:bold;">تعديل منتج</button>
            <button onclick="handleDelete()" style="flex:1; background:red; border:none; padding:10px; border-radius:5px; color:white; font-weight:bold;">حذف منتج</button>
        </div>
        
        <input type="text" id="pn" placeholder="اسم المنتج">
        <input type="number" id="pp" placeholder="السعر">
        <input type="text" id="pi" placeholder="رابط الصورة">
        <select id="pc">
            <option value="KEYBOARDS">كيبوردات</option>
            <option value="MICE">ماوسات</option>
            <option value="MOUSEPADS">ماوس باد</option>
        </select>
        <button id="save-btn" onclick="saveProduct()" class="buy-btn">حفظ المنتج</button>
        
        <h4>سجل الطلبات الواردة 📥</h4>
        <div style="overflow-x:auto;">
            <table class="orders-table">
                <thead><tr><th>حذف</th><th>الاسم</th><th>الهاتف</th><th>المنطقة</th><th>الطلبات</th><th>المجموع</th></tr></thead>
                <tbody id="orders-list"></tbody>
            </table>
        </div>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; color:grey; margin-top:20px;">إغلاق</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v9')) || [];
    let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
    let siteLogo = localStorage.getItem('elite_logo') || 'https://i.ibb.co/LzNfX6X/elite-logo.png';
    let cart = [];
    let editIdx = -1;

    function init() {
        document.getElementById('site-logo-img').src = siteLogo;
        document.getElementById('hero-logo-img').src = siteLogo;
        render();
    }

    function render() {
        let h = '';
        const cats = [{id:'KEYBOARDS', n:'كيبوردات'}, {id:'MICE', n:'ماوسات'}, {id:'MOUSEPADS', n:'ماوس باد'}];
        cats.forEach(c => {
            const items = products.filter(p => p.cat === c.id);
            h += `<div class="category-title">${c.n}</div><div class="grid">`;
            h += items.map(p => `
                <div class="product-card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <div style="color:var(--main-red); font-weight:bold; margin-bottom:10px;">${p.price} ₪</div>
                    <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">إضافة للسلة</button>
                </div>`).join('');
            h += `</div>`;
        });
        document.getElementById('shop-data').innerHTML = h;
        
        document.getElementById('orders-list').innerHTML = orders.map((o, idx) => `
            <tr>
                <td><i class="fas fa-trash remove-x" onclick="deleteOrder(${idx})"></i></td>
                <td>${o.name}</td><td>${o.phone}</td><td>${o.area}</td><td>${o.items}</td><td>${o.total} ₪</td>
            </tr>
        `).reverse().join('');
    }

    function updateLogo() {
        const url = document.getElementById('new-logo-url').value;
        if(url) {
            siteLogo = url;
            localStorage.setItem('elite_logo', url);
            document.getElementById('site-logo-img').src = url;
            document.getElementById('hero-logo-img').src = url;
            alert("تم تحديث اللوجو بنجاح");
        }
    }

    function openAdmin() { if(prompt("كلمة السر:") === "سامي") document.getElementById('admin-modal').style.display='block'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); editIdx = -1; }

    function addToCart(n, p) { cart.push({n, p}); document.getElementById('count').innerText = cart.length; }

    function removeFromCart(index) {
        cart.splice(index, 1);
        document.getElementById('count').innerText = cart.length;
        showCart();
    }

    function showCart() {
        document.getElementById('cart-modal').style.display='block';
        document.getElementById('cart-summary').innerHTML = cart.map((item, index) => `
            <div class="cart-item">
                <span class="remove-x" onclick="removeFromCart(${index})">×</span>
                <span>${item.n}</span>
                <b>${item.p} ₪</b>
            </div>`).join('');
        updateTotal();
    }

    function updateTotal() {
        const delivery = parseInt(document.getElementById('area').value);
        const subtotal = cart.reduce((acc, item) => acc + item.p, 0);
        document.getElementById('total-val').innerText = subtotal + delivery;
    }

    function submitOrder() {
        const n = document.getElementById('cn').value, t = document.getElementById('ct').value, a = document.getElementById('area').value;
        if(!n || !t || a === "0" || cart.length === 0) return alert("الرجاء إكمال البيانات!");
        
        const total = document.getElementById('total-val').innerText;
        orders.push({
            name: n, phone: t, 
            area: document.getElementById('area').options[document.getElementById('area').selectedIndex].text, 
            items: cart.map(i => i.n).join(', '), 
            total: total
        });
        
        localStorage.setItem('elite_orders', JSON.stringify(orders));
        
        document.getElementById('main-site').style.display = 'none';
        document.getElementById('cart-modal').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';
    }

    function deleteOrder(idx) {
        if(confirm("حذف الطلب؟")) {
            orders.splice(idx, 1);
            localStorage.setItem('elite_orders', JSON.stringify(orders));
            render();
        }
    }

    function saveProduct() {
        const n = document.getElementById('pn').value, p = document.getElementById('pp').value, i = document.getElementById('pi').value, c = document.getElementById('pc').value;
        if(editIdx > -1) products[editIdx] = {name:n, price:parseInt(p), img:i, cat:c};
        else products.push({name:n, price:parseInt(p), img:i, cat:c});
        localStorage.setItem('elite_v9', JSON.stringify(products));
        render(); closeModals();
    }

    function handleDelete() {
        const t = prompt("اسم المنتج لحذفه:");
        const idx = products.findIndex(p => p.name === t);
        if(idx > -1) { products.splice(idx,1); localStorage.setItem('elite_v9', JSON.stringify(products)); render(); }
    }

    function handleEdit() {
        const t = prompt("اسم المنتج لتعديله:");
        const idx = products.findIndex(p => p.name === t);
        if(idx > -1) {
            const p = products[idx];
            document.getElementById('pn').value=p.name; document.getElementById('pp').value=p.price; document.getElementById('pi').value=p.img; document.getElementById('pc').value=p.cat;
            editIdx = idx; document.getElementById('save-btn').innerText="تحديث المنتج";
        }
    }

    init();
</script>
</body>
</html>
