<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | BM HIGHSTAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #111; --wa-green: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* شريط التوصيل */
        .delivery-bar { background: var(--main-red); color: white; padding: 8px 0; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .marquee { display: inline-block; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { background: #111; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-red); }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--main-red); background: #222; }
        
        /* الهيرو مع صورة ثابتة قوية */
        .hero { 
            height: 45vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://wallpaperaccess.com/full/1253965.jpg');
            background-size: cover; background-position: center; border-bottom: 2px solid #222;
        }

        .social-float { position: fixed; left: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
        .float-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: white; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .wa-btn { background: var(--wa-green); }
        .tk-btn { background: #000; border: 1px solid #fff; }

        .category-section { padding: 30px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: center; }
        .product-card img { width: 100%; height: 150px; object-fit: contain; background: #000; border-radius: 8px; }
        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 8000; padding: 20px; }
        .modal-content { max-width: 500px; margin: 30px auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid var(--main-red); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; }
    </style>
</head>
<body>

<div class="delivery-bar">
    <div class="marquee">🚀 توصيل لجميع المناطق | 𝐁𝐌 𝐇𝐈𝐆𝐇𝐒𝐓𝐀𝐅𝐅 🚀 أداء بلا حدود 🚀</div>
</div>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="https://i.ibb.co/LzNfX6X/elite-logo.png" id="logo-nav" class="logo-img">
        <b id="name-nav">BM HIGHSTAFF</b>
    </div>
    <nav>
        <button onclick="openAdmin()" style="background:none; color:grey; border:none; cursor:pointer;">[ إدارة ]</button>
        <button onclick="showCart()" style="background:var(--main-red); padding:8px 15px; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer;">السلة (<span id="count">0</span>)</button>
    </nav>
</header>

<div class="hero">
    <h1 style="margin:0; font-size: 3rem; text-shadow: 0 0 20px var(--main-red);">𝐁𝐌 𝐇𝐈𝐆𝐇𝐒𝐓𝐀𝐅𝐅</h1>
    <p style="color:#00f2ff; letter-spacing: 3px;">ELITE PC STORE</p>
</div>

<div id="shop-data" class="category-section">
    </div>

<div class="social-float">
    <a href="https://wa.me/972525995654" class="float-btn wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.tiktok.com/@elite_pc_store" class="float-btn tk-btn" target="_blank"><i class="fab fa-tiktok"></i></a>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-content">
        <h3>إدارة المتجر ⚙️</h3>
        <input type="text" id="pn" placeholder="اسم المنتج">
        <input type="number" id="pp" placeholder="السعر">
        <input type="text" id="pi" placeholder="رابط الصورة">
        <select id="pc">
            <option value="KEY">كيبوردات</option>
            <option value="MOUSE">ماوسات</option>
        </select>
        <button onclick="saveProduct()" class="buy-btn">إضافة منتج</button>
        <button onclick="closeModals()" style="background:none; color:white; width:100%; margin-top:10px; border:none;">إغلاق</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_final')) || [];
    let cart = [];

    function render() {
        let h = '<div class="grid">';
        if(products.length === 0) {
            h = '<p style="text-align:center;">ادخل على "إدارة" وأضف أول منتج يا بطل!</p>';
        } else {
            products.forEach(p => {
                h += `<div class="product-card">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
                    <h3>${p.name}</h3>
                    <b style="color:var(--main-red)">${p.price} ₪</b>
                    <button class="buy-btn" onclick="addToCart()">إضافة للسلة</button>
                </div>`;
            });
            h += '</div>';
        }
        document.getElementById('shop-data').innerHTML = h;
    }

    function openAdmin() { if(prompt("كود -89:") === "-89") document.getElementById('admin-modal').style.display='block'; }
    function closeModals() { document.getElementById('admin-modal').style.display='none'; }

    function saveProduct() {
        const n = document.getElementById('pn').value, p = document.getElementById('pp').value, i = document.getElementById('pi').value, c = document.getElementById('pc').value;
        if(!n || !p) return alert("دخل البيانات!");
        products.push({name:n, price:p, img:i, cat:c});
        localStorage.setItem('elite_final', JSON.stringify(products));
        render(); closeModals();
    }

    function addToCart() { cart.push(1); document.getElementById('count').innerText = cart.length; alert("تمت الإضافة!"); }

    render();
</script>

</body>
</html>
