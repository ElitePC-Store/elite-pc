<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; direction: rtl; }
        header { background: #0a0a0a; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-red); position: sticky; top: 0; z-index: 1000; }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--main-red); }
        .category-section { padding: 20px 5%; }
        .category-title { border-right: 5px solid var(--main-red); padding-right: 15px; margin: 30px 0 20px; font-size: 22px; color: var(--main-red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; position: relative; border: 1px solid #222; }
        .product-card img { width: 100%; height: 150px; object-fit: contain; }
        .badge { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .badge-new { background: #00c851; color: white; }
        .badge-low { background: #ffbb33; color: black; }
        .badge-out { background: #ff4444; color: white; }
        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; }
        .modal-content { max-width: 500px; margin: 50px auto; background: #111; padding: 25px; border-radius: 20px; border: 1px solid var(--main-red); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; font-family: 'Cairo'; }
    </style>
</head>
<body>
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://i.ibb.co/LzNfX6X/elite-logo.png" class="logo-img">
            <b>ELITE PC</b>
        </div>
        <button onclick="showCart()" style="background:var(--main-red); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">السلة (<span id="count">0</span>)</button>
    </header>

    <div id="shop-data" class="category-section"></div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center;">إتمام الطلب</h3>
            <div id="cart-items-list"></div>
            <select id="area" onchange="updateTotal()">
                <option value="0">اختر المنطقة...</option>
                <option value="70">الداخل (+70 ₪)</option>
                <option value="50">القدس (+50 ₪)</option>
                <option value="20">الضفة (+20 ₪)</option>
            </select>
            <input type="text" id="cn" placeholder="الاسم">
            <input type="text" id="ct" placeholder="الهاتف">
            <h2 style="text-align:center;">المجموع: <span id="total-val">0</span> ₪</h2>
            <button onclick="submitOrder()" class="buy-btn" style="background:#25d366;">تأكيد واتساب</button>
            <button onclick="document.getElementById('cart-modal').style.display='none'" style="width:100%; background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('elite_v15')) || [];
        let cart = [];

        function render() {
            let h = '';
            const cats = [{id:'KEYBOARDS', n:'كيبوردات'}, {id:'MICE', n:'ماوسات'}, {id:'MOUSEPADS', n:'ماوس باد'}, {id:'RGB', n:'إضاءة RGB'}, {id:'MIC', n:'مايك'}];
            cats.forEach(c => {
                const items = products.filter(p => p.cat === c.id);
                if(items.length > 0) {
                    h += `<div class="category-title">${c.n}</div><div class="grid">`;
                    h += items.map(p => {
                        let badge = '';
                        if(p.status === 'new') badge = '<span class="badge badge-new">جديد</span>';
                        else if(p.status === 'low') badge = '<span class="badge badge-low">متبقي قليل</span>';
                        else if(p.status === 'out') badge = '<span class="badge badge-out">نفدت</span>';
                        return `<div class="product-card">${badge}<img src="${p.img}"><h3>${p.name}</h3><div style="color:var(--main-red); font-weight:bold;">${p.price} ₪</div><button class="buy-btn" ${p.status === 'out' ? 'disabled style="background:grey"' : ''} onclick="addToCart('${p.name}', ${p.price}, '${p.img}')">${p.status === 'out' ? 'غير متوفر' : 'إضافة للسلة'}</button></div>`;
                    }).join('');
                    h += `</div>`;
                }
            });
            document.getElementById('shop-data').innerHTML = h || '<h3 style="text-align:center">قريباً...</h3>';
        }

        function addToCart(n, p, img) { cart.push({n, p, img}); document.getElementById('count').innerText = cart.length; alert("تمت الإضافة!"); }
        function showCart() {
            if(cart.length === 0) return alert("السلة فاضية!");
            document.getElementById('cart-modal').style.display='block';
            updateTotal();
        }
        function updateTotal() {
            const sub = cart.reduce((a, b) => a + b.p, 0);
            const ship = parseInt(document.getElementById('area').value);
            document.getElementById('total-val').innerText = sub + ship;
        }
        function submitOrder() {
            const n = document.getElementById('cn').value, t = document.getElementById('ct').value, a = document.getElementById('area').value;
            if(!n || !t || a === "0") return alert("كمل البيانات!");
            let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
            orders.push({name:n, phone:t, area:document.getElementById('area').options[document.getElementById('area').selectedIndex].text, total:document.getElementById('total-val').innerText, images:cart.map(i=>i.img)});
            localStorage.setItem('elite_orders', JSON.stringify(orders));
            window.open(`https://wa.me/972525995654?text=${encodeURIComponent('طلب جديد باسم: ' + n)}`);
            cart = []; location.reload();
        }
        render();
    </script>
</body>
</html>
