<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | BM HIGHSTAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #111; --wa-green: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* شريط التوصيل العلوي */
        .delivery-bar { background: var(--main-red); color: white; padding: 8px 0; font-size: 14px; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .marquee { display: inline-block; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { background: rgba(10,10,10,0.95); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--main-red); }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--main-red); object-fit: cover; }
        
        /* منطقة الهيرو */
        .hero { 
            height: 45vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1547082299-de196ea013d6?q=80&w=2070');
            background-size: cover; background-position: center; border-bottom: 2px solid #222;
        }
        .hero-logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--main-red); margin-bottom: 10px; box-shadow: 0 0 15px var(--main-red); }

        .social-float { position: fixed; left: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
        .float-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: white; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .wa-btn { background: var(--wa-green); }
        .tk-btn { background: #000; border: 1px solid #fff; }

        .category-section { padding: 30px 5%; }
        .category-title { border-right: 5px solid var(--main-red); padding-right: 15px; margin-bottom: 25px; font-size: 24px; color: var(--main-red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: center; }
        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* لوحة التحكم المطلوبة بالضبط */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 8000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: 30px auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid var(--main-red); box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); }
        .modal-content h3 { margin-bottom: 20px; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        input, select { 
            width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; 
            color: white; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; font-size: 16px;
        }
        input:focus, select:focus { border-color: var(--main-red); outline: none; }

        .admin-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; }
        .close-link { display: block; margin-top: 15px; color: #888; text-decoration: none; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="delivery-bar">
    <div class="marquee">🚀 يوجد توصيل لجميع مناطق الضفة والقدس والداخل 🚀 أداء بلا حدود مع 𝐁𝐌 𝐇𝐈𝐆𝐇𝐒𝐓𝐀𝐅𝐅 🚀</div>
</div>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="https://i.ibb.co/LzNfX6X/elite-logo.png" class="logo-img">
        <b>ELITE PC</b>
    </div>
    <nav>
        <button onclick="openAdmin()" style="background:none; color:grey; border:none; cursor:pointer;">[ الإدارة ]</button>
        <button onclick="showCart()" style="background:var(--main-red); padding:8px 15px; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer; margin-right:10px;">السلة (<span id="count">0</span>)</button>
    </nav>
</header>

<div class="hero">
    <img src="https://i.ibb.co/LzNfX6X/elite-logo.png" class="hero-logo">
    <h1>ELITE PC</h1>
    <p style="color:#aaa;">Elite PC Gaming Solutions</p>
</div>

<div id="shop-data" class="category-section"></div>

<div class="social-float">
    <a href="https://wa.me/972525995654" class="float-btn wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.tiktok.com/@elite_pc_store" class="float-btn tk-btn" target="_blank"><i class="fab fa-tiktok"></i></a>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-content">
        <h3>إدارة المتجر <i class="fas fa-cog"></i> (كود -89)</h3>
        
        <input type="text" id="pn" placeholder="اسم المنتج">
        <input type="text" id="pp" placeholder="السعر">
        <input type="text" id="pi" placeholder="رابط الصورة">
        
        <select id="pc">
            <option value="KEYBOARDS">كيبوردات</option>
            <option value="MICE">ماوسات</option>
            <option value="MOUSEPADS">ماوس باد</option>
        </select>
        
        <button onclick="saveProduct()" class="admin-btn">حفظ المنتج</button>
        <span onclick="closeModals()" class="close-link">إغلاق</span>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v10')) || [];
    let cart = [];

    function render() {
        const cats = [{id:'KEYBOARDS', n:'كيبوردات'}, {id:'MICE', n:'ماوسات'}, {id:'MOUSEPADS', n:'ماوس باد'}];
        let h = '';
        cats.forEach(c => {
            const items = products.filter(p => p.cat === c.id);
            h += `<div class="category-title">${c.n}</div><div class="grid">`;
            h += items.length ? items.map(p => `
                <div class="product-card">
                    <img src="${p.img}" style="width:100%; height:150px; object-fit:contain; background:#000; border-radius:8px; margin-bottom:10px;">
                    <h3>${p.name}</h3>
                    <b style="color:var(--main-red)">${p.price} ₪</b>
                    <button class="buy-btn" onclick="addToCart()" style="margin-top:10px;">إضافة للسلة</button>
                </div>`).join('') : '<p style="color:#555;">لا يوجد منتجات في هذا القسم.</p>';
            h += `</div>`;
        });
        document.getElementById('shop-data').innerHTML = h;
    }

    function openAdmin() { if(prompt("كود الإدارة:") === "-89") document.getElementById('admin-modal').style.display='block'; }
    function closeModals() { document.getElementById('admin-modal').style.display='none'; }

    function saveProduct() {
        const n = document.getElementById('pn').value;
        const p = document.getElementById('pp').value;
        const i = document.getElementById('pi').value;
        const c = document.getElementById('pc').value;
        
        if(n && p) {
            products.push({name:n, price:p, img:i, cat:c});
            localStorage.setItem('elite_v10', JSON.stringify(products));
            render(); 
            closeModals();
            // مسح الخانات بعد الحفظ
            document.getElementById('pn').value=''; document.getElementById('pp').value=''; document.getElementById('pi').value='';
        } else {
            alert("يرجى إدخال اسم المنتج والسعر على الأقل!");
        }
    }

    function addToCart() { cart.push(1); document.getElementById('count').innerText = cart.length; }

    render();
</script>
</body>
</html>
