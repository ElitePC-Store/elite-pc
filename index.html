<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | متجر النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #151515; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; }
        header { background: #1a1a1a; padding: 15px 20px; border-bottom: 3px solid var(--main-red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--main-red); }
        .nav-btns button { background: var(--main-red); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left:5px; }
        .container { padding: 30px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .product-card { background: var(--card-bg); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; position: relative; }
        .product-card img { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; }
        .product-price { color: var(--main-red); font-size: 24px; font-weight: bold; margin: 10px 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 600px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid var(--main-red); }
        .admin-section { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
        input { width: 100%; padding: 10px; margin: 8px 0; background: #111; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-save { background: #25d366; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .order-item { background: #333; padding: 10px; margin-bottom: 10px; border-right: 5px solid var(--main-red); border-radius: 5px; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://via.placeholder.com/50" id="logo" class="logo-img">
            <span id="store-name" style="font-size: 22px; font-weight: bold;">ELITE PC</span>
        </div>
        <div class="nav-btns">
            <button onclick="showCart()">السلة 🛒 (<span id="count">0</span>)</button>
            <button onclick="openAdmin()" style="background: #444;">الإدارة</button>
        </div>
    </header>

    <div class="container" id="grid"></div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; color:var(--main-red);">لوحة التحكم ⚙️</h2>
            
            <div class="admin-section">
                <h4>📥 الطلبات الواردة</h4>
                <div id="orders-list">لا توجد طلبات بعد.</div>
                <button onclick="clearOrders()" style="background:red; color:white; border:none; margin-top:5px; cursor:pointer;">مسح الكل</button>
            </div>

            <div class="admin-section">
                <h4>➕ إضافة منتج / تحديث هوية</h4>
                <input type="text" id="p-name" placeholder="اسم المنتج">
                <input type="number" id="p-price" placeholder="السعر (₪)">
                <input type="text" id="p-img" placeholder="رابط الصورة">
                <button onclick="saveProduct()" class="btn-save">إضافة منتج</button>
                <hr>
                <input type="text" id="new-logo" placeholder="رابط لوجو جديد">
                <button onclick="saveBrand()" class="btn-save" style="background:#444">تحديث اللوجو</button>
            </div>

            <button onclick="closeModal()" style="width:100%; background:none; color:grey; border:none; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center">إتمام الطلب 🛒</h2>
            <div id="cart-items"></div>
            <hr>
            <input type="text" id="cust-name" placeholder="اسمك الكامل">
            <input type="text" id="cust-phone" placeholder="رقم الهاتف (ضروري)">
            <button onclick="submitOrder()" class="btn-save">تأكيد الطلب وحفظه في الموقع ✅</button>
            <button onclick="closeModal()" style="margin-top:10px; background:none; color:grey; border:none; width:100%;">رجوع</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_p')) || [];
    let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
    let cart = [];

    function init() {
        document.getElementById('store-name').innerText = localStorage.getItem('store_n') || 'ELITE PC';
        if(localStorage.getItem('store_l')) document.getElementById('logo').src = localStorage.getItem('store_l');
        render();
    }

    function render() {
        document.getElementById('grid').innerHTML = products.map((p, i) => `
            <div class="product-card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <div class="product-price">${p.price} ₪</div>
                <button onclick="addCart('${p.name}', ${p.price})" class="btn-save" style="background:var(--main-red)">إضافة للسلة</button>
            </div>
        `).join('');
    }

    function addCart(n, p) { cart.push({n, p}); document.getElementById('count').innerText = cart.length; }

    function submitOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        if(!name || !phone || cart.length === 0) return alert("عبّي البيانات يا بطل!");

        const newOrder = {
            id: Date.now(),
            customer: name,
            phone: phone,
            items: cart.map(i => i.n).join(', '),
            total: cart.reduce((a, b) => a + b.p, 0),
            date: new Date().toLocaleString()
        };

        orders.push(newOrder);
        localStorage.setItem('elite_orders', JSON.stringify(orders));
        alert("تم استلام طلبك بنجاح! شكراً لك.");
        cart = [];
        document.getElementById('count').innerText = 0;
        closeModal();
    }

    function renderOrders() {
        const list = document.getElementById('orders-list');
        if(orders.length === 0) { list.innerHTML = "لا توجد طلبات."; return; }
        list.innerHTML = orders.map(o => `
            <div class="order-item">
                <b>الاسم:</b> ${o.customer} <br>
                <b>الهاتف:</b> ${o.phone} <br>
                <b>الطلبية:</b> ${o.items} <br>
                <b>المجموع:</b> ${o.total} ₪ <br>
                <small>${o.date}</small>
            </div>
        `).join('');
    }

    function saveProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;
        if(!name || !price || !img) return alert("عبّي البيانات!");
        products.push({name, price: parseInt(price), img});
        localStorage.setItem('elite_p', JSON.stringify(products));
        render();
        alert("تمت الإضافة!");
    }

    function saveBrand() {
        const l = document.getElementById('new-logo').value;
        if(l) localStorage.setItem('store_l', l);
        location.reload();
    }

    function openAdmin() { 
        if(prompt("كلمة السر:") === "1234") {
            document.getElementById('admin-modal').style.display='block';
            renderOrders();
        } 
    }
    function clearOrders() { if(confirm("أكيد بدك تمسح كل الطلبات؟")) { orders = []; localStorage.setItem('elite_orders', JSON.stringify(orders)); renderOrders(); } }
    function showCart() { document.getElementById('cart-modal').style.display='block'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

    init();
</script>
</body>
</html>
