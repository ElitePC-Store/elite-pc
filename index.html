<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC | BM HIGHSTAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --whatsapp: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: white; margin: 0; }

        .delivery-bar {
            background: var(--main-red);
            color: white;
            overflow: hidden;
            white-space: nowrap;
            padding: 8px 0;
            font-size: 14px;
            font-weight: bold;
        }
        .delivery-text {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        header { background: rgba(10,10,10,0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--main-red); }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--main-red); object-fit: cover; }

        .hero { 
            height: 50vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1547082299-de196ea013d6?q=80&w=2070'); 
            background-size: cover; 
            background-position: center;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }

        .social-float {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 9999;
        }
        .social-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: 0.3s;
        }
        .social-btn:hover { transform: scale(1.1); }
        .wa { background: var(--whatsapp); }

        .category-section { padding: 40px 5%; }
        .category-title { border-right: 5px solid var(--main-red); padding-right: 15px; margin-bottom: 25px; font-size: 24px; color: var(--main-red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
        
        .product-card { background: #111; border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: center; position: relative; transition: 0.3s; }
        .product-card:hover { border-color: var(--main-red); transform: translateY(-5px); }
        .product-card img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 10px; }
        
        .badge { position: absolute; top: 15px; left: 15px; background: #2ecc71; color: white; padding: 3px 8px; font-size: 11px; border-radius: 5px; font-weight: bold; }
        
        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .buy-btn:hover { opacity: 0.9; }

        #success-page { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="delivery-bar">
        <div class="delivery-text">⚡ يوجد توصيل لجميع مناطق الضفة والقدس والداخل ⚡ أداء بلا حدود مع ELITE PC ⚡</div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://i.ibb.co/LzNfX6X/elite-logo.png" id="logo-main" class="logo-img" alt="Logo">
            <b id="store-name" style="font-size: 18px;">ELITE PC</b>
        </div>
        <nav>
            <button onclick="showCart()" style="background:var(--main-red); padding:10px 20px; border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer;">
                <i class="fas fa-shopping-cart"></i> السلة (<span id="count">0</span>)
            </button>
        </nav>
    </header>

    <div class="hero" id="hero-bg">
        <img src="https://i.ibb.co/LzNfX6X/elite-logo.png" id="hero-logo" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--main-red); margin-bottom:15px; object-fit:cover;" alt="Hero Logo">
        <h1 style="font-size: 2.5rem; margin:0;">ELITE PC</h1>
        <p style="color:#00f2ff; letter-spacing: 2px; margin-top: 10px; direction: ltr; unicode-bidi: embed;">BM HIGHSTAFF - نخبة قطع الكمبيوتر والجيمنج</p>
    </div>

    <!-- زر الواتساب العائم -->
    <div class="social-float">
        <a href="https://wa.me/972000000000" class="social-btn wa" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
    </div>

    <div id="shop-data"></div>

    <div id="success-page">
        <div style="background:#111; padding:40px; border-radius:20px; border:2px solid #25d366; max-width:450px; width:100%;">
            <i class="fas fa-check-circle" style="font-size:65px; color:#25d366; margin-bottom: 15px;"></i>
            <h2>تم استلام طلبك يا وحش!</h2>
            <p id="order-details-text" style="color: #ccc; margin: 20px 0;"></p>
            <button onclick="location.reload()" class="buy-btn">العودة للمتجر</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v8')) || [];
    let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
    let identity = JSON.parse(localStorage.getItem('elite_identity')) || {logo: '', bg: ''};
    let cart = [];

    if(identity.logo) {
        document.getElementById('logo-main').src = identity.logo;
        document.getElementById('hero-logo').src = identity.logo;
    }
    if(identity.bg) {
        document.getElementById('hero-bg').style.background = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('${identity.bg}')`;
        document.getElementById('hero-bg').style.backgroundSize = 'cover';
        document.getElementById('hero-bg').style.backgroundPosition = 'center';
    }

    function renderStore() {
        const cats = [
            {id:'KEYBOARDS', n:'كيبوردات'}, 
            {id:'MICE', n:'ماوسات'}, 
            {id:'MOUSEPADS', n:'ماوس باد'}
        ];
        
        let h = '';
        cats.forEach(c => {
            const items = products.filter(p => p.cat === c.id);
            h += `<div class="category-section">`;
            h += `<div class="category-title">${c.n}</div><div class="grid">`;
            h += items.length ? items.map(p => `
                <div class="product-card">
                    ${p.badge ? `<span class="badge">${p.badge}</span>` : ''}
                    <img src="${p.img}" alt="${p.name}">
                    <h3 style="font-size:16px; margin:10px 0;">${p.name}</h3>
                    <div style="color:var(--main-red); font-weight:bold; font-size:18px; margin-bottom:12px;">${p.price} ₪</div>
                    <button class="buy-btn" onclick="addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price})">إضافة للسلة</button>
                </div>`).join('') : '<p style="color:grey;">لا توجد منتجات في هذا القسم حالياً.</p>';
            h += `</div></div>`;
        });
        
        document.getElementById('shop-data').innerHTML = h;
    }

    function addToCart(n, p) { 
        cart.push({n, p}); 
        document.getElementById('count').innerText = cart.length; 
        alert("تمت إضافة المنتج إلى السلة بنجاح!");
    }

    function showCart() {
        if(cart.length === 0) {
            alert("السلة فارغة حالياً!");
            return;
        }
        const n = prompt("أدخل اسمك الكامل:");
        if(!n) return;
        const t = prompt("أدخل رقم هاتفك للتواصل:");
        if(!t) return;

        if(n && t) {
            const total = cart.reduce((a,b) => a+b.p, 0);
            orders.push({name:n, phone:t, items:cart.map(i=>i.n).join(', '), total:total});
            localStorage.setItem('elite_orders', JSON.stringify(orders));
            
            document.getElementById('success-page').style.display = 'flex';
            document.getElementById('order-details-text').innerText = `يا ${n}، طلبك بقيمة ${total} ₪ صار عندنا. رح نتصل فيك قريباً على رقمك (${t})!`;
            cart = [];
            document.getElementById('count').innerText = cart.length;
        }
    }

    renderStore();
</script>
</body>
</html>
