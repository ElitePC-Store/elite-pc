<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE PC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --whatsapp: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: white; margin: 0; }

        .delivery-bar {
            background: var(--main-red);
            color: white;
            overflow: hidden;
            white-space: nowrap;
            padding: 8px 0;
            font-size: 14px;
            font-weight: bold;
        }
        .delivery-text {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        header { background: rgba(10,10,10,0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--main-red); }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--main-red); object-fit: cover; }

        .hero { 
            height: 50vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1547082299-de196ea013d6?q=80&w=2070'); 
            background-size: cover; 
            background-position: center;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }

        .social-float {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 9999;
        }
        .social-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: 0.3s;
        }
        .social-btn:hover { transform: scale(1.1); }
        .wa { background: var(--whatsapp); }

        .category-section { padding: 40px 5%; }
        .category-title { border-right: 5px solid var(--main-red); padding-right: 15px; margin-bottom: 25px; font-size: 24px; color: var(--main-red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
        
        .product-card { background: #111; border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: center; position: relative; transition: 0.3s; }
        .product-card:hover { border-color: var(--main-red); transform: translateY(-5px); }
        .product-card img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 10px; }
        
        .badge { position: absolute; top: 15px; left: 15px; background: #2ecc71; color: white; padding: 3px 8px; font-size: 11px; border-radius: 5px; font-weight: bold; }
        
        .buy-btn, .action-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-family: 'Cairo', sans-serif; font-size: 16px; }
        .buy-btn:hover, .action-btn:hover { opacity: 0.9; }

        #checkout-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; overflow-y: auto; padding: 20px; }
        .modal-content { max-width: 600px; margin: 30px auto; background: #111; border: 2px solid var(--main-red); border-radius: 15px; padding: 30px; box-sizing: border-box; }
        
        .steps-indicator { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .step-circle { width: 35px; height: 35px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #777; border: 1px solid #444; }
        .step-circle.active { background: var(--main-red); color: white; border-color: var(--main-red); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
        .form-control { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        .payment-box { background: #1a1a1a; border: 2px solid var(--main-red); border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .order-summary-box { background: #161616; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="delivery-bar">
        <div class="delivery-text">⚡ يوجد توصيل لجميع مناطق الضفة والقدس والداخل ⚡ أداء بلا حدود مع ELITE PC ⚡</div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">

            <b id="store-name" style="font-size: 18px;">ELITE PC</b>
        </div>
        <nav>
            <button onclick="openCheckout()" style="background:var(--main-red); padding:10px 20px; border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer;">
                <i class="fas fa-shopping-cart"></i> السلة (<span id="count">0</span>)
            </button>
        </nav>
    </header>

    <div class="hero" id="hero-bg">

        <h1 style="font-size: 2.5rem; margin:0;">ELITE PC</h1>
    </div>

    <div class="social-float">

    <div id="shop-data"></div>

    <div id="checkout-modal">
        <div class="modal-content">

                <div class="step-circle" id="ind-2">2</div>
                <div class="step-circle" id="ind-3">3</div>

            <div id="step-1-content">

                    <label>الاسم الكامل</label>
                    <input type="text" id="c-name" class="form-control" placeholder="أدخل اسمك الكامل">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="text" id="c-phone" class="form-control" placeholder="05xxxxxxxx">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="c-email" class="form-control" placeholder="name@gmail.com">
                </div>
                <div class="form-group">
                    <label>عنوان التوصيل (المنطقة)</label>
                    <select id="c-region" class="form-control" onchange="updateTotal()">
                        <option value="0">اختر منطقتك</option>
                        <option value="60">الداخل - 60₪</option>
                        <option value="100">القدس - 100₪</option>
                        <option value="20">ضفة - 20₪</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المدينة / اسم ضيعتك</label>
                    <input type="text" id="c-city" class="form-control" placeholder="اكتب اسم مدينتك">
                </div>
                <button onclick="goToStep2()" class="action-btn">التالي - مراجعة وتأكيد --</button>
            </div>

            <div id="step-2-content" style="display:none;">
                <h2 style="color:var(--main-red); text-align:center; margin-top:0;">طريقة الدفع</h2>
                <div class="payment-box">
                    <i class="fas fa-money-bill-wave" style="font-size: 30px; color: #2ecc71; margin-bottom: 5px;"></i>
                    <h3 style="margin:5px 0;">الدفع عند الاستلام</h3>
                    <p style="color:#888; font-size:13px; margin:0;">Cash on Delivery</p>
                </div>
                
                <div class="order-summary-box">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span id="summary-items-text">المنتجات</span>
                        <span id="summary-items-price">₪0</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>التوصيل</span>
                        <span id="summary-delivery-price">₪0</span>
                    </div>
                    <hr style="border-color:#333;">
                    <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:bold; color:var(--main-red);">
                        <span>الإجمالي</span>
                        <span id="summary-total-price">₪0</span>
                    </div>
                </div>

                <div style="margin: 15px 0; text-align: right;">
                    <label><input type="checkbox" id="robot-check"> أنا لست روبوت</label>
                </div>

                <div style="display:flex; gap:10px;">
                    <button onclick="goBackToStep1()" class="action-btn" style="background:#333;">رجوع</button>
                    <button onclick="finishOrder()" class="action-btn" style="background:#2ecc71;">تأكيد الطلب</button>
                </div>
            </div>

            <div id="step-3-content" style="display:none; text-align:center;">
                <i class="fas fa-check-circle" style="font-size:65px; color:#25d366; margin-bottom: 15px;"></i>
                <h2>تم استلام طلبك يا وحش!</h2>
                <p id="final-msg" style="color: #ccc; margin: 20px 0;"></p>
                <button onclick="location.reload()" class="action-btn">العودة للمتجر</button>
            </div>
        </div>
    </div>
