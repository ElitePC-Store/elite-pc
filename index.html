<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC | BM HIGHSTAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --whatsapp: #25d366; --tiktok: #010101; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: white; margin: 0; }

        /* شريط التوصيل المتحرك */
        .delivery-bar {
            background: var(--main-red);
            color: white;
            overflow: hidden;
            white-space: nowrap;
            padding: 5px 0;
            font-size: 14px;
            font-weight: bold;
        }
        .delivery-text {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        header { background: rgba(10,10,10,0.95); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--main-red); }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--main-red); object-fit: cover; }

        /* منطقة الهيرو مع صورة البيسي */
        .hero { 
            height: 50vh; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1547082299-de196ea013d6?q=80&w=2070'); 
            background-size: cover; 
            background-position: center;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }

        /* أزرار التواصل الجانبية */
        .social-float {
            position: fixed;
            left: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .social-btn:hover { transform: scale(1.1); }
        .wa { background: var(--whatsapp); }
        .tk { background: var(--tiktok); border: 1px solid white; }

        .category-section { padding: 30px 5%; }
        .category-title { border-right: 5px solid var(--main-red); padding-right: 15px; margin-bottom: 25px; font-size: 24px; color: var(--main-red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: #111; border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: center; }
        .product-card img { width: 100%; height: 160px; object-fit: contain; }
        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Success Page Full Screen */
        #success-page { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div class="delivery-bar">
        <div class="delivery-text">⚡ يوجد توصيل لجميع مناطق الضفة والقدس والداخل ⚡ أداء بلا حدود مع BM HIGHSTAFF ⚡</div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://i.ibb.co/LzNfX6X/elite-logo.png" id="logo-main" class="logo-img">
            <b id="store-name">ELITE PC</b>
        </div>
        <nav>
            <button onclick="openAdmin()" style="background:none; color:grey; border:none; cursor:pointer;">[ لوحة الإدارة ]</button>
            <button onclick="showCart()" style="background:var(--main-red); padding:8px 15px; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer; margin-right:10px;">السلة (<span id="count">0</span>)</button>
        </nav>
    </header>

    <div class="hero">
        <img src="https://i.ibb.co/LzNfX6X/elite-logo.png" style="width:100px; border-radius:50%; border:2px solid var(--main-red); margin-bottom:10px;">
        <h1 style="font-size: 2.5rem; margin:0;">𝐁𝐌 𝐇𝐈𝐆𝐇𝐒𝐓𝐀𝐅𝐅</h1>
        <p style="color:#00f2ff; letter-spacing: 2px;">نخبة قطع الكمبيوتر والجيمنج</p>
    </div>

    <div class="social-float">
        <a href="https://wa.me/YOUR_NUMBER" class="social-btn wa" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.tiktok.com/@YOUR_USER" class="social-btn tk" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>

    <div id="shop-data" class="category-section"></div>

    <div id="success-page">
        <div style="background:#111; padding:40px; border-radius:20px; border:2px solid #25d366; max-width:90%;">
            <i class="fas fa-check-circle" style="font-size:60px; color:#25d366;"></i>
            <h1>تم استلام طلبك يا وحش!</h1>
            <p id="order-details-text"></p>
            <button onclick="location.reload()" class="buy-btn" style="width:150px;">العودة للمتجر</button>
        </div>
    </div>

    <div id="admin-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9000; padding:20px; overflow-y:auto;">
        <div style="max-width:800px; margin:auto; background:#111; padding:25px; border-radius:15px; border:1px solid var(--main-red);">
            <h3>لوحة التحكم المركزية ⚙️</h3>
            <input type="text" id="pn" placeholder="اسم المنتج">
            <input type="number" id="pp" placeholder="السعر">
            <input type="text" id="pi" placeholder="رابط الصورة">
            <select id="pc">
                <option value="KEYBOARDS">كيبوردات</option>
                <option value="MICE">ماوسات</option>
                <option value="MOUSEPADS">ماوس باد</option>
            </select>
            <button onclick="saveProduct()" class="buy-btn">حفظ المنتج</button>
            
            <h4 style="margin-top:30px;">سجل الطلبات الواردة 📥</h4>
            <div id="admin-orders" style="background:#000; padding:10px; font-size:12px;"></div>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="margin-top:20px; background:none; color:grey; border:none;">إغلاق</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v8')) || [];
    let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
    let cart = [];

    function render() {
        const cats = [{id:'KEYBOARDS', n:'كيبوردات'}, {id:'MICE', n:'ماوسات'}, {id:'MOUSEPADS', n:'ماوس باد'}];
        let h = '';
        cats.forEach(c => {
            const items = products.filter(p => p.cat === c.id);
            h += `<div class="category-title">${c.n}</div><div class="grid">`;
            h += items.length ? items.map(p => `
                <div class="product-card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <div style="color:var(--main-red); font-weight:bold;">${p.price} ₪</div>
                    <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})" style="margin-top:10px;">إضافة للسلة</button>
                </div>`).join('') : '<p>لا يوجد منتجات حالياً.</p>';
            h += `</div>`;
        });
        document.getElementById('shop-data').innerHTML = h;
        document.getElementById('admin-orders').innerHTML = orders.map(o => `<div style="border-bottom:1px solid #222; padding:5px;">الاسم: ${o.name} | الطلب: ${o.items} | المجموع: ${o.total} ₪</div>`).reverse().join('');
    }

    function openAdmin() { if(prompt("كود الدخول:") === "-89") document.getElementById('admin-modal').style.display='block'; }
    
    function saveProduct() {
        const n = document.getElementById('pn').value, p = document.getElementById('pp').value, i = document.getElementById('pi').value, c = document.getElementById('pc').value;
        products.push({name:n, price:parseInt(p), img:i, cat:c});
        localStorage.setItem('elite_v8', JSON.stringify(products));
        render(); alert("تمت الإضافة!");
    }

    function addToCart(n, p) { cart.push({n, p}); document.getElementById('count').innerText = cart.length; }

    function showCart() {
        const n = prompt("اسمك الكامل:");
        const t = prompt("رقم هاتفك:");
        if(n && t) {
            const total = cart.reduce((a,b) => a+b.p, 0);
            orders.push({name:n, phone:t, items:cart.map(i=>i.n).join(', '), total:total});
            localStorage.setItem('elite_orders', JSON.stringify(orders));
            document.getElementById('success-page').style.display = 'flex';
            document.getElementById('order-details-text').innerText = `يا ${n}، طلبك بقيمة ${total} ₪ صار عندنا. رح نتصل فيك قريباً!`;
        }
    }

    render();
</script>
</body>
</html>
