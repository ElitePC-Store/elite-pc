<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; direction: rtl; }
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-red); }
        .hero { height: 40vh; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; }
        .modal-content { max-width: 450px; margin: 50px auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid var(--main-red); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; font-family: 'Cairo'; }
        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }
    </style>
</head>
<body>

    <header>
        <img id="logo" src="" style="height:50px; border-radius:50%;">
        <b>ELITE PC STORE</b>
        <button onclick="showCart()" style="background:var(--main-red); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">السلة (<span id="count">0</span>)</button>
    </header>

    <div id="hero" class="hero">
        <h1 style="font-size: 2.5em; text-shadow: 2px 2px 10px #000;">أقوى قطع الـ PC في مكان واحد</h1>
    </div>

    <div id="shop" style="padding: 20px 5%;"></div>

    <!-- مودال الطلب -->
    <div id="cart-modal" class="modal">
        <div id="order-box" class="modal-content">
            <h3 style="text-align:center;">إتمام الطلب</h3>
            <select id="area" onchange="updateTotal()"><option value="0">اختر المنطقة...</option><option value="70">الداخل (+70 ₪)</option><option value="20">الضفة (+20 ₪)</option></select>
            <input type="text" id="un" placeholder="الاسم الكامل">
            <input type="text" id="ut" placeholder="رقم الهاتف">
            <h2 style="text-align:center;">المجموع: <span id="total">0</span> ₪</h2>
            <button onclick="confirmOrder()" class="buy-btn">تأكيد الطلب</button>
        </div>
        <!-- رسالة الشكر -->
        <div id="thank-you" class="modal-content" style="display:none; text-align:center;">
            <i class="fas fa-check-circle" style="font-size: 50px; color: #25d366;"></i>
            <h2>تم استلام طلبك بنجاح!</h2>
            <p>سنتواصل معك قريباً لتأكيد التوصيل.</p>
            <button onclick="location.reload()" class="buy-btn">العودة للمتجر</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v15')) || [];
    let cart = [];

    function updateStyle() {
        document.getElementById('logo').src = localStorage.getItem('elite_logo') || 'https://via.placeholder.com/50';
        document.getElementById('hero').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${localStorage.getItem('elite_bg') || 'https://via.placeholder.com/1200x400'}')`;
    }

    function render() {
        let h = '';
        const cats = [{id:'KEYBOARDS', n:'كيبوردات'}, {id:'MICE', n:'ماوسات'}, {id:'RGB', n:'أضوية RGB'}, {id:'MIC', n:'مايك'}];
        cats.forEach(c => {
            const items = products.filter(p => p.cat === c.id);
            if(items.length > 0) {
                h += `<h2 style="color:var(--main-red); border-right:4px solid var(--main-red); padding-right:10px;">${c.n}</h2><div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap:20px;">`;
                h += items.map(p => `<div style="background:#111; padding:15px; border-radius:10px; text-align:center; border:1px solid #222;"><img src="${p.img}" style="width:100%; height:120px; object-fit:contain;"><h3>${p.name}</h3><b style="color:var(--main-red)">${p.price} ₪</b><button onclick="addToCart('${p.name}', ${p.price}, '${p.img}')" class="buy-btn">إضافة</button></div>`).join('');
                h += `</div>`;
            }
        });
        document.getElementById('shop').innerHTML = h;
    }

    function addToCart(n, p, img) { cart.push({n, p, img}); document.getElementById('count').innerText = cart.length; }
    function showCart() { document.getElementById('cart-modal').style.display='block'; }
    function updateTotal() { document.getElementById('total').innerText = cart.reduce((a,b)=>a+b.p,0) + parseInt(document.getElementById('area').value); }
    
    function confirmOrder() {
        const n = document.getElementById('un').value, t = document.getElementById('ut').value, a = document.getElementById('area').value;
        if(!n || !t || a === "0") return alert("عبّي البيانات");
        let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
        orders.push({name:n, phone:t, total:document.getElementById('total').innerText, items:cart.map(i=>i.n).join(', '), images:cart.map(i=>i.img), date:new Date().toLocaleString()});
        localStorage.setItem('elite_orders', JSON.stringify(orders));
        document.getElementById('order-box').style.display='none';
        document.getElementById('thank-you').style.display='block';
    }

    updateStyle(); render();
</script>
</body>
</html>
