<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; direction: rtl; }
        
        /* هيدر مدمج الألوان */
        header { 
            background: linear-gradient(90deg, #000 0%, #4b0000 50%, #000 100%);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--main-red); position: sticky; top: 0; z-index: 1000;
        }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--main-red); object-fit: contain; background: white; }
        
        .hero { 
            height: 40vh; background-size: cover; background-position: center; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
            padding: 0 20px;
        }
        .hero h1 { font-size: 2em; text-shadow: 2px 2px 10px #000; color: #fff; }

        /* تنسيق الجريد للموبايل */
        .category-section { padding: 20px 5%; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; 
        }
        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

        .product-card { 
            background: var(--card-bg); border-radius: 12px; padding: 10px; 
            text-align: center; position: relative; border: 1px solid #222;
        }
        .product-card img { width: 100%; height: 120px; object-fit: contain; }
        
        /* ملصقات الحالة */
        .badge { position: absolute; top: 5px; right: 5px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-new { background: #00c851; color: white; }
        .badge-out { background: #ff4444; color: white; }
        .badge-low { background: #ffbb33; color: black; }

        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 8px; font-size: 14px; }
        
        /* روابط التواصل الاجتماعي */
        .social-bar { padding: 20px; text-align: center; background: #000; border-top: 1px solid #222; }
        .social-bar a { color: white; font-size: 24px; margin: 0 15px; text-decoration: none; }
        .social-bar a:hover { color: var(--main-red); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; }
        .modal-content { max-width: 400px; margin: 20px auto; background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--main-red); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <img id="main-logo" src="" class="logo-img">
        <div style="text-align:center;">
            <div style="font-weight:bold; font-size:18px;">ELITE PC</div>
        </div>
        <button onclick="showCart()" style="background:var(--main-red); color:white; border:none; padding:8px 12px; border-radius:5px;">
            <i class="fas fa-shopping-cart"></i> (<span id="count">0</span>)
        </button>
    </header>

    <div id="hero-sec" class="hero">
        <h1>أقوى قطع الـ PC في مكان واحد</h1>
    </div>

    <div id="shop-display" class="category-section"></div>

    <div class="social-bar">
        <a href="https://wa.me/972525995654" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://tiktok.com/@your_user" target="_blank"><i class="fab fa-tiktok"></i></a>
        <p style="font-size:12px; color:#555; margin-top:10px;">&copy; 2026 Elite PC Store</p>
    </div>

    <div id="cart-modal" class="modal">
        <div id="order-form" class="modal-content">
            <h3 style="text-align:center;">إتمام الطلب</h3>
            <select id="area" onchange="updateTotal()"><option value="0">اختر المنطقة...</option><option value="70">الداخل (+70 ₪)</option><option value="20">الضفة (+20 ₪)</option></select>
            <input type="text" id="un" placeholder="الاسم الكامل">
            <input type="text" id="ut" placeholder="رقم الهاتف">
            <h2 style="text-align:center;">المجموع: <span id="total-price">0</span> ₪</h2>
            <button onclick="sendOrder()" class="buy-btn">تأكيد الطلب</button>
        </div>
        <div id="thank-you" class="modal-content" style="display:none; text-align:center;">
            <i class="fas fa-check-circle" style="font-size:40px; color:#00c851;"></i>
            <h3>تم استلام طلبك!</h3>
            <button onclick="location.reload()" class="buy-btn">إغلاق</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v15')) || [];
    let cart = [];

    function init() {
        document.getElementById('main-logo').src = localStorage.getItem('elite_logo') || 'https://via.placeholder.com/50';
        document.getElementById('hero-sec').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${localStorage.getItem('elite_bg') || ''}')`;
        render();
    }

    function render() {
        let h = '';
        const cats = [{id:'KEYBOARDS', n:'كيبوردات'}, {id:'MICE', n:'ماوسات'}, {id:'MOUSEPADS', n:'ماوس باد'}, {id:'RGB', n:'أضوية RGB'}, {id:'MIC', n:'مايك'}];
        cats.forEach(c => {
            const items = products.filter(p => p.cat === c.id);
            if(items.length > 0) {
                h += `<h3 style="color:var(--main-red); border-right:3px solid var(--main-red); padding-right:10px;">${c.n}</h3><div class="grid">`;
                h += items.map(p => {
                    let b = p.status === 'new' ? '<span class="badge badge-new">جديد</span>' : 
                            p.status === 'out' ? '<span class="badge badge-out">نفدت</span>' : 
                            p.status === 'low' ? '<span class="badge badge-low">قليل</span>' : '';
                    return `
                    <div class="product-card">
                        ${b}
                        <img src="${p.img}">
                        <h4 style="margin:5px 0; font-size:14px;">${p.name}</h4>
                        <b style="color:var(--main-red)">${p.price} ₪</b>
                        <button onclick="addToCart('${p.name}', ${p.price}, '${p.img}')" class="buy-btn" ${p.status === 'out' ? 'disabled style="background:#444"' : ''}>
                            ${p.status === 'out' ? 'غير متوفر' : 'إضافة'}
                        </button>
                    </div>`;
                }).join('');
                h += `</div>`;
            }
        });
        document.getElementById('shop-display').innerHTML = h || '<p style="text-align:center">لا يوجد منتجات حالياً</p>';
    }

    function addToCart(n, p, img) { cart.push({n, p, img}); document.getElementById('count').innerText = cart.length; }
    function showCart() { document.getElementById('cart-modal').style.display='block'; updateTotal(); }
    function updateTotal() { document.getElementById('total-price').innerText = cart.reduce((a,b)=>a+b.p,0) + parseInt(document.getElementById('area').value); }
    
    function sendOrder() {
        const n = document.getElementById('un').value, t = document.getElementById('ut').value, a = document.getElementById('area').value;
        if(!n || !t || a === "0") return alert("أكمل البيانات");
        let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
        orders.push({name:n, phone:t, total:document.getElementById('total-price').innerText, items:cart.map(i=>i.n).join(', '), images:cart.map(i=>i.img), date:new Date().toLocaleString()});
        localStorage.setItem('elite_orders', JSON.stringify(orders));
        document.getElementById('order-form').style.display='none';
        document.getElementById('thank-you').style.display='block';
    }
    init();
</script>
</body>
</html>
