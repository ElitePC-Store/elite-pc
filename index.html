<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | متجر النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #151515; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* شريط التوصيل العلوي */
        .delivery-bar { background: var(--main-red); color: white; text-align: center; padding: 5px; font-size: 14px; font-weight: bold; position: sticky; top: 0; z-index: 2000; }

        header { background: #1a1a1a; padding: 15px 20px; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; border: 1px solid var(--main-red); }

        /* واجهة الترحيب */
        .hero { height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1350&q=80'); background-size: cover; text-align: center; }
        .hero img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--main-red); margin-bottom: 20px; }
        .hero h1 { font-size: 40px; margin: 0; text-shadow: 2px 2px 10px rgba(255,77,77,0.5); }

        .container { padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .product-card { background: var(--card-bg); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; transition: 0.3s; }
        .product-card:hover { border-color: var(--main-red); transform: translateY(-5px); }
        .product-card img { width: 100%; height: 200px; object-fit: contain; }
        .btn-add { background: var(--main-red); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        /* الأزرار العائمة */
        .floating-btn { position: fixed; bottom: 20px; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: white; z-index: 3000; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .wa-btn { right: 20px; background: #25d366; }
        .tt-btn { right: 80px; background: #000; border: 1px solid #fff; }

        /* المودال (السلة والطلب) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; padding: 20px; }
        .modal-content { max-width: 500px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid var(--main-red); }
        select, input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; }

        /* صفحة النجاح */
        #success-page { display: none; text-align: center; padding: 50px 20px; }
        .success-card { background: #1a1a1a; max-width: 600px; margin: auto; padding: 30px; border-radius: 15px; border-top: 10px solid var(--main-red); }
        .check-icon { font-size: 60px; color: #25d366; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="delivery-bar">🚚 يوجد توصيل لكل المناطق (الداخل، القدس، الضفة)</div>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="" id="nav-logo" class="logo-img">
            <span id="nav-name" style="font-weight:bold; font-size:1.2rem;">ELITE PC</span>
        </div>
        <button onclick="showCart()" style="background:var(--main-red); color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">السلة (<span id="cart-count">0</span>)</button>
    </header>

    <div class="hero">
        <img src="" id="hero-logo">
        <h1 id="hero-name">ELITE PC STORE</h1>
        <p>مرحباً بك في عالم النخبة للجيمنج</p>
    </div>

    <div class="container" id="product-grid"></div>

    <a href="https://wa.me/972525995654" class="floating-btn wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.tiktok.com/@elite_pc_store" class="floating-btn tt-btn" target="_blank"><i class="fab fa-tiktok"></i></a>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center;">إتمام الطلب 🛒</h2>
            <div id="cart-items-list"></div>
            <select id="shipping-area" onchange="updateTotal()">
                <option value="0">اختر المنطقة...</option>
                <option value="70">الداخل (+70 ₪)</option>
                <option value="50">القدس (+50 ₪)</option>
                <option value="20">الضفة (+20 ₪)</option>
            </select>
            <input type="text" id="cust-name" placeholder="الاسم الكامل">
            <input type="text" id="cust-phone" placeholder="رقم الهاتف">
            <h3 style="text-align:center;">المجموع النهائي: <span id="final-total">0</span> ₪</h3>
            <button onclick="confirmOrder()" class="btn-add" style="background:#25d366">تأكيد الطلب وحفظه ✅</button>
            <button onclick="closeModal()" style="background:none; color:grey; border:none; width:100%; margin-top:10px; cursor:pointer;">رجوع</button>
        </div>
    </div>

    <div id="success-page">
        <div class="success-card">
            <div class="check-icon"><i class="fas fa-check-circle"></i></div>
            <h2 style="color:white;">شكراً لك. تم استلام طلبك.</h2>
            <div style="display:flex; justify-content:space-around; margin:30px 0; font-size:14px; border-top:1px solid #333; padding-top:20px;">
                <div><small>رقم الطلب</small><br><b id="order-id">#123</b></div>
                <div><small>التاريخ</small><br><b id="order-date"></b></div>
                <div><small>الإجمالي</small><br><b id="order-total"></b></div>
            </div>
            <div style="text-align:right; background:#222; padding:15px; border-radius:10px;">
                <h4>تفاصيل الطلب:</h4>
                <div id="order-summary-details"></div>
            </div>
            <button onclick="location.reload()" class="btn-add">العودة للمتجر</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_p')) || [];
    let cart = [];
    let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];

    function init() {
        const name = localStorage.getItem('store_n') || 'ELITE PC';
        const logo = localStorage.getItem('store_l') || 'https://via.placeholder.com/150';
        document.getElementById('nav-name').innerText = name;
        document.getElementById('hero-name').innerText = name;
        document.getElementById('nav-logo').src = logo;
        document.getElementById('hero-logo').src = logo;
        renderProducts();
    }

    function renderProducts() {
        document.getElementById('product-grid').innerHTML = products.map((p, i) => `
            <div class="product-card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <div style="color:var(--main-red); font-size:22px; font-weight:bold;">${p.price} ₪</div>
                <button class="btn-add" onclick="addToCart('${p.name}', ${p.price})">إضافة للسلة</button>
            </div>
        `).join('');
    }

    function addToCart(n, p) { cart.push({n, p}); document.getElementById('cart-count').innerText = cart.length; alert("تمت الإضافة!"); }
    function showCart() { document.getElementById('cart-modal').style.display='block'; updateTotal(); }
    function closeModal() { document.getElementById('cart-modal').style.display='none'; }

    function updateTotal() {
        const subtotal = cart.reduce((a, b) => a + b.p, 0);
        const shipping = parseInt(document.getElementById('shipping-area').value);
        document.getElementById('final-total').innerText = subtotal + shipping;
    }

    function confirmOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const shipping = parseInt(document.getElementById('shipping-area').value);
        if(!name || !phone || shipping === 0) return alert("الرجاء تعبئة الاسم والرقم واختيار المنطقة!");

        const orderData = {
            id: Math.floor(Math.random() * 90000) + 10000,
            customer: name,
            phone: phone,
            items: cart.map(i => i.n).join(', '),
            total: cart.reduce((a, b) => a + b.p, 0) + shipping,
            date: new Date().toLocaleDateString('ar-EG')
        };

        orders.push(orderData);
        localStorage.setItem('elite_orders', JSON.stringify(orders));
        
        // إظهار صفحة النجاح
        document.body.innerHTML = "";
        document.body.appendChild(document.getElementById('success-page'));
        document.getElementById('success-page').style.display = "block";
        document.getElementById('order-id').innerText = "#" + orderData.id;
        document.getElementById('order-date').innerText = orderData.date;
        document.getElementById('order-total').innerText = orderData.total + " ₪";
        document.getElementById('order-summary-details').innerHTML = cart.map(i => `<p>${i.n} <span>${i.p} ₪</span></p>`).join('');
    }

    init();
</script>
</body>
</html>
