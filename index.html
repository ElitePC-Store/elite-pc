<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | BM HIGHSTAFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #111; --wa-green: #25d366; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* شريط التوصيل المتحرك */
        .delivery-bar {
            background: var(--main-red);
            color: white;
            padding: 8px 0;
            font-size: 14px;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        header { background: rgba(10,10,10,0.95); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--main-red); }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--main-red); object-fit: cover; }
        
        /* منطقة الهيرو مع صورة البيسي */
        .hero { 
            height: 45vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1547082299-de196ea013d6?q=80&w=2070');
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid #222;
        }
        .hero-logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--main-red); margin-bottom: 10px; box-shadow: 0 0 15px var(--main-red); }

        /* أزرار التواصل الطائرة */
        .social-float {
            position: fixed;
            left: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
        }
        .float-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .wa-btn { background: var(--wa-green); }
        .tk-btn { background: #000; border: 1px solid #fff; }

        .category-section { padding: 30px 5%; }
        .category-title { border-right: 5px solid var(--main-red); padding-right: 15px; margin-bottom: 25px; font-size: 24px; color: var(--main-red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: center; }
        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Modals & Success Page */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 8000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: 30px auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid var(--main-red); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        #success-page { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 9000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div class="delivery-bar">
    <div class="marquee">🚀 يوجد توصيل لجميع مناطق الضفة والقدس والداخل 🚀 أداء بلا حدود مع BM HIGHSTAFF 🚀</div>
</div>

<div id="main-site">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="" id="logo-nav" class="logo-img">
            <b id="name-nav"></b>
        </div>
        <nav>
            <button onclick="openAdmin()" style="background:none; color:grey; border:none; cursor:pointer;">[ الإدارة ]</button>
            <button onclick="showCart()" style="background:var(--main-red); padding:8px 15px; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer; margin-right:10px;">السلة (<span id="count">0</span>)</button>
        </nav>
    </header>

    <div class="hero">
        <img src="" id="logo-hero" class="hero-logo">
        <h1 style="margin:0; font-size: 2.5rem;" id="name-hero"></h1>
        <p style="color:#aaa;">Elite PC Gaming Solutions</p>
    </div>

    <div id="shop-data" class="category-section"></div>
</div>

<div class="social-float">
    <a href="https://wa.me/972525995654" class="float-btn wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.tiktok.com/@elite_pc_store" class="float-btn tk-btn" target="_blank"><i class="fab fa-tiktok"></i></a>
</div>

<div id="success-page">
    <div style="background:#111; padding:40px; border-radius:20px; border:2px solid #25d366;">
        <i class="fas fa-check-circle" style="font-size:70px; color:#25d366; margin-bottom:20px;"></i>
        <h1>تم استلام طلبك يا وحش! ✅</h1>
        <p id="order-details"></p>
        <button onclick="location.reload()" class="buy-btn" style="width:150px; margin-top:20px;">العودة للمتجر</button>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
        <h3>إدارة المتجر ⚙️ (كود -89)</h3>
        <div style="background:#1a1a1a; padding:15px; border-radius:10px; margin-bottom:20px; border-right: 4px solid var(--main-red);">
            <h4>🖼️ تحديث اللوجو والاسم</h4>
            <input type="text" id="new-name" placeholder="اسم المتجر الجديد">
            <input type="text" id="new-logo" placeholder="رابط لوجو جديد">
            <button onclick="saveIdentity()" class="buy-btn" style="background:#2ecc71;">تحديث الهوية ✅</button>
        </div>
        <div style="display:flex; gap:10px;"><button onclick="handleEdit()" style="flex:1; background:orange;">تعديل</button><button onclick="handleDelete()" style="flex:1; background:red;">حذف</button></div>
        <input type="text" id="pn" placeholder="اسم المنتج"><input type="number" id="pp" placeholder="السعر"><input type="text" id="pi" placeholder="رابط الصورة">
        <select id="pc"><option value="KEYBOARDS">كيبوردات</option><option value="MICE">ماوسات</option><option value="MOUSEPADS">ماوس باد</option></select>
        <button onclick="saveProduct()" class="buy-btn">حفظ المنتج</button>
        <h4 style="margin-top:30px;">سجل الطلبات الواردة 📥</h4>
        <div id="admin-orders-list" style="background:#000; padding:10px; max-height:200px; overflow-y:auto; font-size:12px;"></div>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; color:grey; margin-top:20px;">إغلاق</button>
    </div>
</div>

<div id="cart-modal" class="modal">
    <div class="modal-content">
        <h3>تأكيد الطلب 🛒</h3>
        <div id="cart-summary" style="margin-bottom:10px;"></div>
        <select id="area" onchange="updateTotal()">
            <option value="0">اختر منطقة التوصيل...</option>
            <option value="70">الداخل (+70 ₪)</option>
            <option value="50">القدس (+50 ₪)</option>
            <option value="20">الضفة (+20 ₪)</option>
        </select>
        <input type="text" id="cn" placeholder="اسمك الكامل"><input type="text" id="ct" placeholder="رقم الهاتف">
        <h2 style="text-align:center;">المجموع: <span id="total-val">0</span> ₪</h2>
        <button onclick="submitOrder()" class="buy-btn" style="background:#25d366;">تأكيد الطلب</button>
        <button onclick="closeModals()" style="width:100%; background:none; color:grey; margin-top:10px;">رجوع</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v10')) || [];
    let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
    let cart = [];
    let editIdx = -1;

    function init() {
        const n = localStorage.getItem('store_name') || 'ELITE PC';
        const l = localStorage.getItem('store_logo') || 'https://i.ibb.co/LzNfX6X/elite-logo.png';
        document.getElementById('name-nav').innerText = n;
        document.getElementById('name-hero').innerText = n;
        document.getElementById('logo-nav').src = l;
        document.getElementById('logo-hero').src = l;
        render();
    }

    function render() {
        const cats = [{id:'KEYBOARDS', n:'كيبوردات'}, {id:'MICE', n:'ماوسات'}, {id:'MOUSEPADS', n:'ماوس باد'}];
        let h = '';
        cats.forEach(c => {
            const items = products.filter(p => p.cat === c.id);
            h += `<div class="category-title">${c.n}</div><div class="grid">`;
            h += items.length ? items.map(p => `<div class="product-card"><img src="${p.img}"><h3>${p.name}</h3><b>${p.price} ₪</b><button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})" style="margin-top:10px;">إضافة للسلة</button></div>`).join('') : '<p>لا يوجد منتجات.</p>';
            h += `</div>`;
        });
        document.getElementById('shop-data').innerHTML = h;
        document.getElementById('admin-orders-list').innerHTML = orders.map(o => `<div style="border-bottom:1px solid #333; padding:5px;">الاسم: ${o.name} | الطلب: ${o.items} | المجموع: ${o.total} ₪</div>`).reverse().join('');
    }

    function openAdmin() { if(prompt("كود الإدارة:") === "-89") document.getElementById('admin-modal').style.display='block'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); editIdx = -1; }

    function saveIdentity() {
        const n = document.getElementById('new-name').value, l = document.getElementById('new-logo').value;
        if(n) localStorage.setItem('store_name', n);
        if(l) localStorage.setItem('store_logo', l);
        location.reload();
    }

    function saveProduct() {
        const n = document.getElementById('pn').value, p = document.getElementById('pp').value, i = document.getElementById('pi').value, c = document.getElementById('pc').value;
        if(editIdx > -1) products[editIdx] = {name:n, price:parseInt(p), img:i, cat:c};
        else products.push({name:n, price:parseInt(p), img:i, cat:c});
        localStorage.setItem('elite_v10', JSON.stringify(products));
        render(); closeModals();
    }

    function addToCart(n, p) { cart.push({n, p}); document.getElementById('count').innerText = cart.length; }

    function showCart() {
        document.getElementById('cart-modal').style.display='block';
        document.getElementById('cart-summary').innerHTML = cart.map(i => `<div style="display:flex;justify-content:space-between;"><span>${i.n}</span><b>${i.p} ₪</b></div>`).join('');
        updateTotal();
    }

    function updateTotal() { const s = parseInt(document.getElementById('area').value); document.getElementById('total-val').innerText = cart.reduce((a,b) => a+b.p, 0) + s; }

    function submitOrder() {
        const n = document.getElementById('cn').value, t = document.getElementById('ct').value, a = document.getElementById('area').value;
        if(!n || !t || a === "0") return alert("البيانات ناقصة!");
        const total = document.getElementById('total-val').innerText;
        orders.push({name:n, phone:t, items:cart.map(i=>i.n).join(', '), total:total});
        localStorage.setItem('elite_orders', JSON.stringify(orders));
        document.getElementById('main-site').style.display='none'; document.getElementById('cart-modal').style.display='none'; document.getElementById('success-page').style.display='flex';
        document.getElementById('order-details').innerHTML = `<b>الاسم:</b> ${n}<br><b>المجموع النهائي:</b> ${total} ₪<br><b>المنتجات:</b> ${cart.map(i=>i.n).join(', ')}`;
    }

    function handleDelete() {
        const t = prompt("اسم المنتج لحذفه:");
        const idx = products.findIndex(p => p.name === t);
        if(idx > -1) { products.splice(idx,1); localStorage.setItem('elite_v10', JSON.stringify(products)); render(); }
    }

    function handleEdit() {
        const t = prompt("اسم المنتج لتعديله:");
        const idx = products.findIndex(p => p.name === t);
        if(idx > -1) {
            const p = products[idx];
            document.getElementById('pn').value=p.name; document.getElementById('pp').value=p.price; document.getElementById('pi').value=p.img; document.getElementById('pc').value=p.cat;
            editIdx = idx;
        }
    }

    init();
</script>
</body>
</html>
