<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC | المتجر الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; direction: rtl; }
        
        header { 
            background: linear-gradient(90deg, #000 0%, #600 50%, #000 100%);
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--main-red); position: sticky; top: 0; z-index: 1000;
        }

        .hero { 
            height: 35vh; background-size: cover; background-position: center; 
            display: flex; align-items: center; justify-content: center; text-align: center;
        }

        .category-title { border-right: 4px solid var(--main-red); padding-right: 10px; margin: 25px 5%; color: var(--main-red); font-size: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 5%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .product-card { background: #111; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #222; position: relative; }
        .product-card img { width: 100%; height: 130px; object-fit: contain; }
        
        .badge { position: absolute; top: 5px; left: 5px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-new { background: #00c851; }
        .badge-out { background: #ff4444; }

        .btn-add { background: var(--main-red); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; margin-top: 10px; }

        /* مودال الدفع والفاتورة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; padding: 20px; }
        .modal-content { max-width: 500px; margin: 20px auto; background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--main-red); }
        
        .invoice-box { background: white; color: black; padding: 20px; border-radius: 10px; font-family: 'Courier New', Courier, monospace; text-align: right; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <img id="store-logo" src="" style="height:45px; border-radius:50%; background:white;">
        <h2 style="margin:0; font-size:18px;">ELITE PC</h2>
        <button onclick="openCart()" style="background:var(--main-red); border:none; color:white; padding:8px 15px; border-radius:8px;">
            <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
        </button>
    </header>

    <div id="hero-banner" class="hero">
        <h1 style="text-shadow: 2px 2px 8px #000;">أقوى قطع الـ PC في مكان واحد</h1>
    </div>

    <div id="main-shop"></div>

    <!-- روابط السوشيال ميديا -->
    <div style="text-align:center; padding:30px; background:#050505;">
        <a href="https://wa.me/972525995654" style="color:#25d366; font-size:30px; margin:0 15px;"><i class="fab fa-whatsapp"></i></a>
        <a href="https://tiktok.com/@elite_pc" style="color:white; font-size:30px; margin:0 15px;"><i class="fab fa-tiktok"></i></a>
    </div>

    <!-- مودال الشراء -->
    <div id="payment-modal" class="modal">
        <div id="form-side" class="modal-content">
            <h3 style="text-align:center; color:var(--main-red);">إتمام الطلب الملكي</h3>
            <input type="text" id="cust-name" placeholder="الاسم الكامل">
            <input type="text" id="cust-phone" placeholder="رقم الهاتف (واتساب)">
            <input type="email" id="cust-email" placeholder="البريد الإلكتروني (اختياري)">
            <select id="cust-area" onchange="calcTotal()">
                <option value="0">اختر منطقة التوصيل...</option>
                <option value="70">الداخل المحتل (+70 ₪)</option>
                <option value="50">القدس (+50 ₪)</option>
                <option value="20">الضفة الغربية (+20 ₪)</option>
            </select>
            <div style="background:#000; padding:15px; border-radius:10px; margin:10px 0;">
                <span>المجموع النهائي: </span>
                <span id="final-price" style="font-size:24px; color:var(--main-red); font-weight:bold;">0</span> ₪
            </div>
            <button onclick="processOrder()" class="btn-add">تأكيد الطلب وإصدار الفاتورة</button>
            <button onclick="closeModal()" style="background:none; color:grey; border:none; width:100%; margin-top:10px;">إلغاء</button>
        </div>

        <!-- شكل الفاتورة بعد الطلب -->
        <div id="invoice-side" class="modal-content" style="display:none;">
            <div class="invoice-box" id="bill">
                <center>
                    <h2 style="margin:0;">ELITE PC STORE</h2>
                    <p>فاتورة مبيعات رقم: <span id="inv-id"></span></p>
                </center>
                <hr>
                <p><b>الزبون:</b> <span id="inv-name"></span></p>
                <p><b>التاريخ:</b> <span id="inv-date"></span></p>
                <hr>
                <div id="inv-items"></div>
                <hr>
                <p style="font-size:18px;"><b>المجموع الكلي: ₪<span id="inv-total"></span></b></p>
                <center style="margin-top:20px; color:#600;">
                    <p><b>"نورتنا يا غالي، قطعك الجديدة رح تخلي لعبك نار! 🔥"</b></p>
                    <small>شكراً لاختيارك ELITE PC</small>
                </center>
            </div>
            <button onclick="location.reload()" class="btn-add" style="background:#25d366;">تم استلام الفاتورة ✅</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v15')) || [];
    let cart = [];

    function init() {
        document.getElementById('store-logo').src = localStorage.getItem('elite_logo') || '';
        document.getElementById('hero-banner').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${localStorage.getItem('elite_bg') || ''}')`;
        render();
    }

    function render() {
        const cats = [
            {id:'KEYBOARDS', n:'كيبوردات'}, {id:'MICE', n:'ماوسات'}, 
            {id:'MOUSEPADS', n:'ماوس باد'}, {id:'RGB', n:'أضوية RGB'}, {id:'MIC', n:'مايك'}
        ];
        let html = '';
        cats.forEach(c => {
            const items = products.filter(p => p.cat === c.id);
            if(items.length > 0) {
                html += `<div class="category-title">${c.n}</div><div class="grid">`;
                html += items.map(p => `
                    <div class="product-card">
                        ${p.status !== 'none' ? `<span class="badge ${p.status === 'new' ? 'badge-new' : 'badge-out'}">${p.status === 'new' ? 'جديد ✨' : 'نفد'}</span>` : ''}
                        <img src="${p.img}">
                        <h4 style="margin:10px 0;">${p.name}</h4>
                        <b style="color:var(--main-red)">${p.price} ₪</b>
                        <button onclick="addToCart('${p.name}', ${p.price}, '${p.img}')" class="btn-add" ${p.status === 'out' ? 'disabled style="background:#444"' : ''}>إضافة للسلة</button>
                    </div>
                `).join('');
                html += `</div>`;
            }
        });
        document.getElementById('main-shop').innerHTML = html;
    }

    function addToCart(n, p, img) {
        cart.push({name:n, price:p, img:img});
        document.getElementById('cart-count').innerText = cart.length;
        alert("تمت الإضافة للسلة!");
    }

    function openCart() {
        if(cart.length === 0) return alert("السلة فاضية!");
        document.getElementById('payment-modal').style.display = 'block';
        calcTotal();
    }

    function calcTotal() {
        const sub = cart.reduce((sum, item) => sum + item.price, 0);
        const ship = parseInt(document.getElementById('cust-area').value);
        document.getElementById('final-price').innerText = sub + ship;
    }

    function processOrder() {
        const n = document.getElementById('cust-name').value, 
              ph = document.getElementById('cust-phone').value,
              em = document.getElementById('cust-email').value,
              ar = document.getElementById('cust-area').value;

        if(!n || !ph || ar === "0") return alert("عبّي بياناتك يا وحش عشان نصلك!");

        const total = document.getElementById('final-price').innerText;
        const date = new Date().toLocaleString('ar-EG');
        const orderId = Math.floor(1000 + Math.random() * 9000);

        // حفظ في اللوحة
        let orders = JSON.parse(localStorage.getItem('elite_orders')) || [];
        orders.push({id: orderId, name:n, phone:ph, email:em, total:total, items: cart.map(i=>i.name).join(', '), images: cart.map(i=>i.img), date:date});
        localStorage.setItem('elite_orders', JSON.stringify(orders));

        // عرض الفاتورة
        document.getElementById('form-side').style.display = 'none';
        document.getElementById('invoice-side').style.display = 'block';
        document.getElementById('inv-id').innerText = orderId;
        document.getElementById('inv-name').innerText = n;
        document.getElementById('inv-date').innerText = date;
        document.getElementById('inv-total').innerText = total;
        document.getElementById('inv-items').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between;"><span>${i.name}</span><span>${i.price} ₪</span></div>`).join('');
    }

    function closeModal() { document.getElementById('payment-modal').style.display = 'none'; }
    init();
</script>
</body>
</html>
