<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | متجر النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #151515; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* الهيدر */
        header { background: #1a1a1a; padding: 15px 20px; border-bottom: 3px solid var(--main-red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--main-red); }
        .nav-btns button { background: var(--main-red); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 5px; }

        /* بانر العرض */
        .hero { width: 100%; height: 350px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1587202372775-e229f172b9d7?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 3.5rem; margin: 0; text-shadow: 0 0 20px var(--main-red); }
        .delivery-banner { background: var(--main-red); width: 100%; text-align: center; padding: 5px 0; font-weight: bold; font-size: 14px; }

        /* المنتجات */
        .container { padding: 30px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: auto; }
        .product-card { background: var(--card-bg); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; transition: 0.3s; position: relative; }
        .product-card:hover { border-color: var(--main-red); transform: translateY(-10px); }
        .product-card img { width: 100%; height: 220px; object-fit: contain; border-radius: 10px; margin-bottom: 15px; }
        .product-price { color: var(--main-red); font-size: 26px; font-weight: bold; margin: 10px 0; }

        /* لوحة التحكم والسلة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 600px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid var(--main-red); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-action { background: #25d366; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div class="delivery-banner">🚚 توصيل متوفر للقدس، الداخل، والضفة الغربية</div>
    
    <header>
        <div class="logo-area">
            <img src="https://via.placeholder.com/100" id="store-logo" class="logo-img">
            <span id="display-name" style="font-size: 24px; font-weight: bold;">ELITE PC</span>
        </div>
        <div class="nav-btns">
            <button onclick="showCart()">السلة 🛒 (<span id="cart-count">0</span>)</button>
            <button onclick="openAdmin()" style="background: #444;">لوحة التحكم</button>
        </div>
    </header>

    <div class="hero">
        <h1 id="hero-title">ELITE PC STORE</h1>
        <p style="font-size: 1.2rem;">نخبة أجهزة الحاسوب في متناول يدك</p>
    </div>

    <div class="container" id="products-grid"></div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h2>⚙️ إدارة المتجر</h2>
            <hr border-color="#333">
            <h3>1. إعدادات المتجر العامة</h3>
            <input type="text" id="edit-name" placeholder="اسم المتجر">
            <input type="text" id="edit-logo" placeholder="رابط لوجو المتجر">
            <h3>2. إضافة منتج جديد</h3>
            <input type="text" id="p-name" placeholder="اسم المنتج">
            <input type="number" id="p-price" placeholder="السعر بالـ ₪">
            <input type="text" id="p-img" placeholder="رابط صورة المنتج">
            <textarea id="p-desc" placeholder="تفاصيل المنتج"></textarea>
            <button onclick="addProduct()" class="btn-action" style="background: var(--main-red);">إضافة المنتج للمحل ✅</button>
            <br><br>
            <button onclick="toggleDelete()" class="btn-action" style="background: #555;">تفعيل/تعطيل الحذف 🗑️</button>
            <button onclick="closeModals()" style="background:none; color:grey; border:none; width:100%; margin-top:10px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h2>🛒 سلتك الحالية</h2>
            <div id="cart-items-list"></div>
            <hr>
            <select id="shipping-zone" onchange="updateFinalTotal()">
                <option value="0">اختر منطقة التوصيل...</option>
                <option value="50">القدس (+50 ₪)</option>
                <option value="70">الداخل (+70 ₪)</option>
                <option value="20">الضفة (+20 ₪)</option>
            </select>
            <h3 style="text-align:center">المجموع النهائي: <span id="final-total" style="color:var(--main-red)">0</span> ₪</h3>
            <input type="text" id="customer-name" placeholder="اسمك الكامل">
            <button onclick="sendOrder()" class="btn-action">تأكيد الطلب واتساب ✅</button>
            <button onclick="closeModals()" style="background:none; color:grey; border:none; width:100%; margin-top:10px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_products')) || [];
    let cart = [];
    let canDelete = false;

    // تشغيل الموقع
    function init() {
        renderProducts();
        document.getElementById('display-name').innerText = localStorage.getItem('store_name') || 'ELITE PC';
        document.getElementById('hero-title').innerText = localStorage.getItem('store_name') || 'ELITE PC STORE';
        if(localStorage.getItem('store_logo')) document.getElementById('store-logo').src = localStorage.getItem('store_logo');
    }

    function renderProducts() {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = products.map((p, index) => `
            <div class="product-card">
                <button class="delete-btn" style="display:${canDelete?'block':'none'}" onclick="deleteProduct(${index})">X</button>
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p style="font-size:12px; color:#aaa;">${p.desc}</p>
                <div class="product-price">${p.price} ₪</div>
                <button onclick="addToCart('${p.name}', ${p.price})" class="btn-action" style="padding:10px; font-size:14
