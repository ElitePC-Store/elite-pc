<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | أداء بلا حدود</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; overflow-x: hidden; }
        header { background: rgba(15,15,15,0.95); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--main-red); }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--main-red); object-fit: cover; }
        .hero { height: 50vh; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070'); background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--main-red); margin-bottom: 10px; }
        .category-section { padding: 30px 5%; }
        .category-title { border-right: 5px solid var(--main-red); padding-right: 15px; margin-bottom: 25px; font-size: 24px; color: var(--main-red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid #222; text-align: center; }
        .product-card img { width: 100%; height: 160px; object-fit: contain; }
        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 450px; margin: 30px auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid var(--main-red); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        .admin-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .admin-btns button { flex: 1; padding: 10px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; color: white; }
        .success-page { text-align: center; padding: 100px 5%; }
        .success-icon { font-size: 80px; color: #25d366; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="main-page">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="https://i.ibb.co/LzNfX6X/elite-logo.png" class="logo-img">
                <b style="font-size: 1.2rem;">ELITE PC</b>
            </div>
            <nav>
                <button onclick="openAdmin()" style="background:none; color:grey; border:1px solid #333; padding:5px 10px; border-radius:5px; cursor:pointer;">الإدارة</button>
                <button onclick="showCart()" style="background:var(--main-red); color:white; border:none; padding:6px 15px; border-radius:5px; cursor:pointer; margin-right:10px;">السلة (<span id="cart-count">0</span>)</button>
            </nav>
        </header>

        <div class="hero">
            <img src="https://i.ibb.co/LzNfX6X/elite-logo.png">
            <h1>أداء بلا حدود</h1>
            <p>متجرك المختار لأفضل قطع الجيمنج</p>
        </div>

        <div id="shop-content" class="category-section"></div>
    </div>

    <div id="success-screen" class="success-page" style="display:none;">
        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
        <h1 style="color:var(--main-red);">شكراً لك! تم استلام طلبك.</h1>
        <p id="order-summary-text"></p>
        <button onclick="location.reload()" class="buy-btn" style="width:200px;">العودة للمتجر</button>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center;">لوحة تحكم الإدارة 🕹️</h3>
            <div class="admin-btns">
                <button onclick="handleEdit()" style="background:#ffa500;">تعديل منتج</button>
                <button onclick="handleDelete()" style="background:#ff3333;">حذف منتج</button>
            </div>
            <hr style="border:0.5px solid #222;">
            <input type="text" id="p-name" placeholder="اسم المنتج">
            <input type="number" id="p-price" placeholder="السعر (₪)">
            <input type="text" id="p-img" placeholder="رابط الصورة">
            <select id="p-cat">
                <option value="KEYBOARDS">كيبوردات</option>
                <option value="MICE">ماوسات</option>
                <option value="MOUSEPADS">ماوس باد</option>
            </select>
            <button id="save-btn" onclick="saveProduct()" class="buy-btn">حفظ المنتج الجديد</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center;">إتمام الطلب 🛒</h3>
            <div id="cart-items-list" style="margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:10px;"></div>
            <select id="ship-area" onchange="updateTotal()">
                <option value="0">اختر منطقة التوصيل...</option>
                <option value="70">الداخل (+70 ₪)</option>
                <option value="50">القدس (+50 ₪)</option>
                <option value="20">الضفة (+20 ₪)</option>
            </select>
            <input type="text" id="c-name" placeholder="الاسم الكامل">
            <input type="text" id="c-phone" placeholder="رقم الهاتف">
            <h2 style="text-align:center;">المجموع: <span id="total-val">0</span> ₪</h2>
            <button onclick="submitOrder()" class="buy-btn" style="background:#25d366;">تأكيد الطلب نهائياً</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">رجوع</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v4')) || [];
    let cart = [];
    const categories = [{id:'KEYBOARDS', n:'كيبوردات'}, {id:'MICE', n:'ماوسات'}, {id:'MOUSEPADS', n:'ماوس باد'}];
    let editIndex = -1;

    function render() {
        let html = '';
        categories.forEach(cat => {
            const items = products.filter(p => p.cat === cat.id);
            html += `<div class="category-title">${cat.n}</div><div class="grid">`;
            html += items.length ? items.map(p => `
                <div class="product-card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <div style="color:var(--main-red); font-weight:bold; font-size:1.2rem;">${p.price} ₪</div>
                    <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">إضافة للسلة</button>
                </div>`).join('') : '<p style="color:#333;">لا توجد منتجات هنا.</p>';
            html += `</div>`;
        });
        document.getElementById('shop-content').innerHTML = html;
    }

    function openAdmin() { if(prompt("كلمة السر:") === "-89") document.getElementById('admin-modal').style.display='block'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); editIndex = -1; }

    function saveProduct() {
        const name = document.getElementById('p-name').value, price = document.getElementById('p-price').value, img = document.getElementById('p-img').value, cat = document.getElementById('p-cat').value;
        if(!name || !price) return alert("عبّي البيانات!");
        
        if(editIndex > -1) { products[editIndex] = {name, price:parseInt(price), img, cat}; alert("تم التعديل!"); }
        else { products.push({name, price:parseInt(price), img, cat}); alert("تمت الإضافة!"); }
        
        localStorage.setItem('elite_v4', JSON.stringify(products));
        render(); closeModal();
    }

    function handleDelete() {
        const target = prompt("اكتب اسم المنتج الذي تريد حذفه بدقة:");
        const idx = products.findIndex(p => p.name === target);
        if(idx > -1) { if(confirm("أكيد بدك تحذف " + target + "؟")) { products.splice(idx, 1); localStorage.setItem('elite_v4', JSON.stringify(products)); render(); alert("تم الحذف!"); } }
        else alert("المنتج غير موجود!");
    }

    function handleEdit() {
        const target = prompt("اكتب اسم المنتج لتعديله:");
        const idx = products.findIndex(p => p.name === target);
        if(idx > -1) {
            const p = products[idx];
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-img').value = p.img;
            document.getElementById('p-cat').value = p.cat;
            editIndex = idx;
            document.getElementById('save-btn').innerText = "تحديث البيانات";
        } else alert("المنتج غير موجود!");
    }

    function addToCart(n, p) { cart.push({n, p}); document.getElementById('cart-count').innerText = cart.length; }
    function showCart() {
        document.getElementById('cart-modal').style.display='block';
        document.getElementById('cart-items-list').innerHTML = cart.map(i => `<div>- ${i.n} (${i.p} ₪)</div>`).join('');
        updateTotal();
    }
    function updateTotal() { const ship = parseInt(document.getElementById('ship-area').value); document.getElementById('total-val').innerText = cart.reduce((a, b) => a + b.p, 0) + ship; }

    function submitOrder() {
        const name = document.getElementById('c-name').value, phone = document.getElementById('c-phone').value, area = document.getElementById('ship-area').value;
        if(!name || !phone || area === "0") return alert("البيانات ناقصة!");
        
        document.getElementById('main-page').style.display = 'none';
        document.getElementById('cart-modal').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';
        document.getElementById('order-summary-text').innerText = `طلبك باسم (${name}) بمجموع ${document.getElementById('total-val').innerText} ₪ قيد المعالجة الآن.`;
    }

    render();
</script>
</body>
</html>
