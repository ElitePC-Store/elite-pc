<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | أداء بلا حدود</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; margin: 0; }
        
        /* Header */
        header { background: rgba(20,20,20,0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .nav-links a { color: white; text-decoration: none; margin: 0 15px; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--main-red); }

        /* Hero Section */
        .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070'); background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-bottom: 2px solid var(--main-red); }
        .hero img { width: 120px; margin-bottom: 20px; }
        .hero h1 { font-size: 60px; margin: 0; font-weight: 700; }
        .hero p { font-size: 18px; color: #ccc; max-width: 600px; }

        /* Categories Section */
        .category-section { padding: 50px 5%; }
        .category-title { border-right: 4px solid var(--main-red); padding-right: 15px; margin-bottom: 30px; font-size: 24px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 50px; }
        
        .product-card { background: var(--card-bg); border-radius: 10px; padding: 15px; border: 1px solid #222; text-align: center; transition: 0.3s; }
        .product-card:hover { border-color: var(--main-red); }
        .product-card img { width: 100%; height: 180px; object-fit: contain; }
        .product-card h3 { font-size: 18px; margin: 15px 0 5px; }
        .price { color: var(--main-red); font-weight: bold; font-size: 20px; }
        .buy-btn { background: var(--main-red); color: white; border: none; width: 100%; padding: 10px; border-radius: 5px; margin-top: 15px; cursor: pointer; font-weight: bold; }

        /* Floating Buttons */
        .float-btns { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .f-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .wa { background: #25d366; }
        .tt { background: #000; border: 1px solid #fff; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: 50px auto; background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--main-red); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; }

        /* Empty state */
        .empty-msg { text-align: center; color: #555; padding: 20px; border: 1px dashed #333; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="" id="logo-nav" style="height:40px; border-radius:50%;">
            <b id="name-nav">ELITE PC</b>
        </div>
        <nav class="nav-links">
            <a href="#" onclick="openAdmin()">لوحة التحكم</a>
            <a href="#" onclick="showCart()">السلة (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <div class="hero">
        <img src="" id="logo-hero">
        <h1 id="title-hero">أداء بلا حدود</h1>
        <p>متجرك الأول لإكسسوارات الكمبيوتر والجيمنج - كيبوردات، ماوسات، سماعات، وماوس باد مختارة بعناية لأعلى مستويات الأداء.</p>
    </div>

    <div class="category-section">
        <div id="sections-container">
            </div>
    </div>

    <div class="float-btns">
        <a href="https://wa.me/972525995654" class="f-btn wa"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.tiktok.com/@elite_pc_store" class="f-btn tt"><i class="fab fa-tiktok"></i></a>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h3>إضافة منتج جديد ⚙️</h3>
            <input type="text" id="p-name" placeholder="اسم المنتج">
            <input type="number" id="p-price" placeholder="السعر (₪)">
            <input type="text" id="p-img" placeholder="رابط الصورة">
            <select id="p-cat">
                <option value="KEYBOARDS">كيبوردات</option>
                <option value="MICE">ماوسات</option>
                <option value="HEADSETS">سماعات</option>
                <option value="MOUSEPADS">ماوس باد</option>
            </select>
            <button onclick="saveProduct()" class="buy-btn">إضافة للمتجر</button>
            <hr>
            <button onclick="clearAll()" style="background:red" class="buy-btn">مسح كل المنتجات</button>
            <button onclick="closeModal()" style="background:none; border:none; color:grey; width:100%; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h3>إتمام الطلب 🛒</h3>
            <div id="cart-list"></div>
            <select id="area">
                <option value="0">اختر منطقة التوصيل...</option>
                <option value="70">الداخل (+70 ₪)</option>
                <option value="50">القدس (+50 ₪)</option>
                <option value="20">الضفة (+20 ₪)</option>
            </select>
            <input type="text" id="c-name" placeholder="الاسم الكامل">
            <input type="text" id="c-phone" placeholder="رقم الهاتف">
            <button onclick="sendOrder()" class="buy-btn" style="background:#25d366">تأكيد الطلب</button>
            <button onclick="closeModal()" style="background:none; border:none; color:grey; width:100%; cursor:pointer;">رجوع</button>
        </div>
    </div>

<script>
    let products = JSON.parse(localStorage.getItem('elite_v3')) || [];
    let cart = [];

    const categories = [
        { id: 'KEYBOARDS', name: 'كيبوردات' },
        { id: 'MICE', name: 'ماوسات' },
        { id: 'HEADSETS', name: 'سماعات' },
        { id: 'MOUSEPADS', name: 'ماوس باد' }
    ];

    function init() {
        const logo = localStorage.getItem('store_l') || 'https://via.placeholder.com/100';
        document.getElementById('logo-nav').src = logo;
        document.getElementById('logo-hero').src = logo;
        render();
    }

    function render() {
        let html = '';
        categories.forEach(cat => {
            const catProds = products.filter(p => p.cat === cat.id);
            html += `
                <div class="category-title">${cat.name}</div>
                <div class="grid">
                    ${catProds.length ? catProds.map(p => `
                        <div class="product-card">
                            <img src="${p.img}">
                            <h3>${p.name}</h3>
                            <div class="price">${p.price} ₪</div>
                            <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">إضافة للسلة</button>
                        </div>
                    `).join('') : '<div class="empty-msg">لا توجد منتجات في هذه الفئة بعد.</div>'}
                </div>
            `;
        });
        document.getElementById('sections-container').innerHTML = html;
    }

    function saveProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;
        const cat = document.getElementById('p-cat').value;
        if(!name || !price || !img) return alert("عبّي كل الخانات!");
        
        products.push({name, price: parseInt(price), img, cat});
        localStorage.setItem('elite_v3', JSON.stringify(products));
        render();
        alert("تمت الإضافة بنجاح!");
    }

    function addToCart(n, p) { cart.push({n, p}); document.getElementById('cart-count').innerText = cart.length; alert("تمت الإضافة للسلة!"); }
    function showCart() { document.getElementById('cart-modal').style.display='block'; }
    function openAdmin() { if(prompt("كلمة السر:") === "1234") document.getElementById('admin-modal').style.display='block'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function clearAll() { if(confirm("أكيد بدك تمسح كل المتجر؟")) { products = []; localStorage.setItem('elite_v3', JSON.stringify(products)); render(); } }

    function sendOrder() {
        const name = document.getElementById('c-name').value;
        const phone = document.getElementById('c-phone').value;
        const area = parseInt(document.getElementById('area').value);
        if(!name || !phone || area === 0) return alert("عبّي بيانات التوصيل!");
        
        const total = cart.reduce((a, b) => a + b.p, 0) + area;
        alert(`شكراً ${name}! تم استلام طلبك بمجموع ${total} ₪. سيتم التواصل معك قريباً.`);
        cart = []; document.getElementById('cart-count').innerText = 0; closeModal();
    }

    init();
</script>
</body>
</html>
