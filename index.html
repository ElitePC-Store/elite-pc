<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite PC Store | متجر النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #ff4d4d; --dark-bg: #0a0a0a; --card-bg: #151515; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding-bottom: 100px; }
        
        /* الهيدر */
        header { background: linear-gradient(to bottom, #1a1a1a, #000); padding: 30px; text-align: center; border-bottom: 3px solid var(--main-red); position: relative; }
        .delivery-tag { position: absolute; left: 10px; top: 10px; background: var(--main-red); padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .store-title { font-size: 2.8rem; margin: 10px 0; color: #fff; text-shadow: 0 0 15px var(--main-red); }

        /* المنتجات */
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: var(--main-red); transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: contain; border-radius: 10px; }
        .card h3 { margin: 15px 0 5px; }
        .card .price { color: var(--main-red); font-size: 22px; font-weight: bold; margin-bottom: 15px; }

        /* السلة والطلب */
        .order-section { background: #111; margin: 20px; padding: 25px; border-radius: 15px; border: 1px solid var(--main-red); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; font-family: 'Cairo'; }
        .btn-send { background: #25d366; color: white; border: none; width: 100%; padding: 15px; font-size: 1.2rem; cursor: pointer; border-radius: 8px; font-weight: bold; }
        
        /* لوحة التحكم */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <div class="delivery-tag">🚚 توصيل للقدس، الداخل والضفة</div>
        <h1 class="store-title">ELITE PC STORE ♔</h1>
        <button onclick="openAdmin()" style="background:none; border:none; color:#444; cursor:pointer; font-size:12px;">[ لوحة التحكم ]</button>
    </header>

    <div class="container" id="products-grid">
        </div>

    <div class="order-section">
        <h2 style="color: var(--main-red); text-align: center;">🛒 إتمام الطلب</h2>
        <div id="cart-summary" style="margin-bottom: 15px; border-bottom: 1px dashed #444; padding-bottom: 10px;">السلة فارغة</div>
        
        <label>منطقة التوصيل:</label>
        <select id="delivery-zone" onchange="calcTotal()">
            <option value="0">اختر المنطقة...</option>
            <option value="50">القدس (+50 NIS)</option>
            <option value="70">الداخل (+70 NIS)</option>
            <option value="20">الضفة (+20 NIS)</option>
        </select>

        <h3 style="text-align: center;">المجموع النهائي: <span id="total-cost" style="color:var(--main-red)">0</span> NIS</h3>
        
        <input type="text" id="cust-name" placeholder="الاسم الكامل">
        <input type="text" id="cust-phone" placeholder="رقم الهاتف">
        <button class="btn-send" onclick="sendToWhatsApp()">إرسال الطلب عبر الواتساب ✅</button>
    </div>

    <div id="admin-panel">
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="background:red; color:white; padding:10px; border:none; margin-bottom:10px; cursor:pointer;">إغلاق X</button>
        <iframe src="https://docs.google.com/spreadsheets/d/1GIfPWOymEKjJBCFyXuNd8oO579ShvA0leRuLSlswKR0/edit" style="width: 100%; height: 90%; border: none;"></iframe>
    </div>

<script>
    let cart = [];
    let itemsTotal = 0;

    // سحب البيانات من Google Sheets
    const sheetId = '1GlfPWOymEKjJBCFyXuNd8oO579ShvA0leRuLSlswKR0';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    fetch(url).then(res => res.text()).then(data => {
        const json = JSON.parse(data.substr(47).slice(0, -2));
        const rows = json.table.rows;
        let html = '';
        rows.forEach((row, i) => {
            if (i === 0) return;
            const name = row.c[0] ? row.c[0].v : '';
            const price = row.c[1] ? row.c[1].v : 0;
            const img = row.c[2] ? row.c[2].v : '';
            html += `<div class="card">
                <img src="${img}">
                <h3>${name}</h3>
                <div class="price">${price} NIS</div>
                <button class="btn-send" style="background:var(--main-red); padding:8px;" onclick="addToCart('${name}', ${price})">إضافة للسلة</button>
            </div>`;
        });
        document.getElementById('products-grid').innerHTML = html;
    });

    function addToCart(n, p) {
        cart.push(n);
        itemsTotal += p;
        document.getElementById('cart-summary').innerText = "المنتجات المختارة: " + cart.join(' - ');
        calcTotal();
    }

    function calcTotal() {
        let ship = parseInt(document.getElementById('delivery-zone').value);
        document.getElementById('total-cost').innerText = itemsTotal + ship;
    }

    function sendToWhatsApp() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const total = document.getElementById('total-cost').innerText;
        const zone = document.getElementById('delivery-zone').options[document.getElementById('delivery-zone').selectedIndex].text;
        
        if(!name || !phone || itemsTotal == 0) return alert("عبّي السلة واسمك يا وحش!");

        const msg = `طلب جديد من Elite PC Store:%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aالمنطقة: ${zone}%0Aالمنتجات: ${cart.join(', ')}%0Aالمجموع: ${total} NIS`;
        window.open(`https://wa.me/972525995654?text=${msg}`, '_blank');
    }

    function openAdmin() {
        if(prompt("كلمة السر:") === "1234") document.getElementById('admin-panel').style.display='block';
    }
</script>
</body>
</html>
